<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Bestellung anlegen</title>
    <link rel="stylesheet" href="/static/styles/uebersicht.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1>Bestellung anlegen</h1>
        <p class="hero__subtitle">Neue Bestellung erfassen und speichern.</p>
      </header>

      <section class="panel">
        <form id="bestellungForm" class="form">
          <div class="form__row">
            <label>Positionen</label>
            <div id="positionenContainer" class="position-list"></div>
            <button class="btn btn--ghost" type="button" id="addPositionBtn">
              Position hinzufuegen
            </button>
          </div>
          <div class="form__row">
            <label for="bestellDatum">Bestelldatum</label>
            <input id="bestellDatum" name="bestellDatum" type="date" required />
            <div
              id="bestellnummerPreview"
              style="margin-top: 8px; color: var(--ink-soft)"
            ></div>
          </div>
          <div class="form__actions">
            <button class="btn btn--primary" type="submit">Speichern</button>
            <a class="btn btn--ghost" href="/uebersicht">Abbrechen</a>
          </div>
          <div id="formMessage" class="form__message" role="status"></div>
        </form>
      </section>
    </div>

    <nav class="navbar">
      <a class="navbar__item" href="/uebersicht">Dashboard</a>
      <a class="navbar__item is-active" href="/bestellung-neu">Neu</a>
      <a class="navbar__item" href="/bestellungen">Bestellungen</a>
      <a class="navbar__item" href="/lieferanten">Lieferanten</a>
      <a class="navbar__item" href="/artikel">Artikel</a>
      <a class="navbar__item" href="/einstellungen">Einstellungen</a>
    </nav>

    <script>
      const form = document.getElementById("bestellungForm");
      const message = document.getElementById("formMessage");
      const bestellDatumInput = document.getElementById("bestellDatum");
      const positionenContainer = document.getElementById(
        "positionenContainer",
      );
      const addPositionBtn = document.getElementById("addPositionBtn");
      let lieferanten = [];
      let artikel = [];

      // Artikel-Suche (über alle Lieferanten)
      let artikelSearchModal = null;
      let artikelSearchInput = null;
      let artikelSearchList = null;
      let artikelSearchClose = null;
      let artikelSearchResolver = null;

      const confirmDoubleDelete = (
        firstMessage = "Wirklich loeschen?",
        secondMessage = "Endgueltig loeschen?",
      ) => {
        if (!window.confirm(firstMessage)) return false;
        return window.confirm(secondMessage);
      };

      const normalizeText = (v) => String(v || "").toLowerCase().trim();

      const ensureArtikelSearchModal = () => {
        if (artikelSearchModal) return;
        artikelSearchModal = document.createElement("div");
        artikelSearchModal.className = "modal";
        artikelSearchModal.setAttribute("aria-hidden", "true");
        artikelSearchModal.innerHTML = `
          <div class="modal__backdrop"></div>
          <div class="modal__content modal__content--md" role="dialog" aria-modal="true">
            <div class="modal__header">
              <h2>Artikel suchen</h2>
              <button class="btn btn--link" type="button" id="artikelSearchClose">Schliessen</button>
            </div>
            <div class="form" style="gap: 10px">
              <input id="artikelSearchInput" type="search" placeholder="Suchen (Artikel, Nummer, Lieferant ...)" />
              <div class="list" id="artikelSearchList" style="max-height: 60vh; overflow: auto"></div>
              <div class="list__meta" style="color: var(--ink-soft)">
                Tipp: Du kannst auch nur eine Artikelnummer eingeben.
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(artikelSearchModal);
        artikelSearchInput = artikelSearchModal.querySelector("#artikelSearchInput");
        artikelSearchList = artikelSearchModal.querySelector("#artikelSearchList");
        artikelSearchClose = artikelSearchModal.querySelector("#artikelSearchClose");
        const backdrop = artikelSearchModal.querySelector(".modal__backdrop");
        const close = () => {
          artikelSearchModal.classList.remove("is-open");
          artikelSearchModal.setAttribute("aria-hidden", "true");
          artikelSearchResolver = null;
        };
        if (artikelSearchClose) artikelSearchClose.addEventListener("click", close);
        if (backdrop) backdrop.addEventListener("click", close);
      };

      const openArtikelSearch = () =>
        new Promise((resolve) => {
          ensureArtikelSearchModal();
          artikelSearchResolver = resolve;
          if (artikelSearchList) artikelSearchList.innerHTML = "";
          if (artikelSearchInput) artikelSearchInput.value = "";
          artikelSearchModal.classList.add("is-open");
          artikelSearchModal.setAttribute("aria-hidden", "false");
          if (artikelSearchInput) artikelSearchInput.focus();
          const render = () => {
            if (!artikelSearchList) return;
            const term = normalizeText(artikelSearchInput?.value || "");
            const lieferantNameById = {};
            (Array.isArray(lieferanten) ? lieferanten : []).forEach((l) => {
              lieferantNameById[Number(l.id)] = l.name || `#${l.id}`;
            });
            const all = Array.isArray(artikel) ? artikel : [];
            const filtered = !term
              ? all.slice(0, 80)
              : all
                  .filter((a) => {
                    const hay = [
                      a?.name,
                      a?.artikelnummer,
                      lieferantNameById[Number(a?.lieferantId)],
                      a?.beschreibung,
                      a?.einheit,
                      a?.verpackungseinheit,
                    ]
                      .filter(Boolean)
                      .join(" ")
                      .toLowerCase();
                    return hay.includes(term);
                  })
                  .slice(0, 80);

            artikelSearchList.innerHTML = "";
            if (!filtered.length) {
              const empty = document.createElement("div");
              empty.className = "list__row";
              empty.textContent = "Keine Treffer.";
              artikelSearchList.appendChild(empty);
              return;
            }
            filtered.forEach((a) => {
              const row = document.createElement("button");
              row.type = "button";
              row.className = "list__row list__row--clickable";
              row.style.width = "100%";
              row.style.textAlign = "left";
              row.style.border = "0";
              row.style.cursor = "pointer";
              const lid = Number(a?.lieferantId);
              const title = document.createElement("div");
              title.className = "list__title";
              title.textContent = String(a?.name || `Artikel #${a?.id || ""}`);
              const meta = document.createElement("div");
              meta.className = "list__meta";
              const nr = String(a?.artikelnummer || "").trim();
              meta.textContent = nr ? `Artikelnummer: ${nr}` : "Artikelnummer: -";
              const desc = document.createElement("div");
              desc.className = "list__meta";
              desc.style.marginTop = "4px";
              desc.textContent = String(a?.beschreibung || "").trim() || "—";
              const supplier = document.createElement("div");
              supplier.className = "list__meta";
              supplier.style.marginTop = "4px";
              supplier.textContent = `Lieferant: ${String(
                lieferantNameById[lid] || `#${lid}`,
              )}`;
              row.appendChild(title);
              row.appendChild(meta);
              row.appendChild(desc);
              row.appendChild(supplier);
              row.addEventListener("click", () => {
                artikelSearchModal.classList.remove("is-open");
                artikelSearchModal.setAttribute("aria-hidden", "true");
                const fn = artikelSearchResolver;
                artikelSearchResolver = null;
                if (typeof fn === "function") fn(a);
              });
              artikelSearchList.appendChild(row);
            });
          };
          if (artikelSearchInput) {
            artikelSearchInput.oninput = render;
          }
          render();
        });

      const buildSelect = (items, placeholder) => {
        const select = document.createElement("select");
        select.required = true;
        select.setAttribute("aria-label", placeholder);

        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = placeholder;
        select.appendChild(defaultOption);

        items.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.id;
          option.textContent = item.name || `#${item.id}`;
          select.appendChild(option);
        });

        return select;
      };

      const artikelCache = {};
      const MANUAL_ARTIKEL_VALUE = "__manual__";
      const getArtikelByLieferantAndId = (lieferantId, artikelId) => {
        const items = artikelCache[lieferantId] || [];
        return items.find((i) => Number(i.id) === Number(artikelId));
      };
      const populateArtikelForLieferant = async (
        artikelSelect,
        lieferantId,
        selectedId,
      ) => {
        artikelSelect.innerHTML = "";
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "Artikel";
        artikelSelect.appendChild(defaultOption);
        if (!lieferantId) {
          artikelSelect.disabled = true;
          return;
        }
        artikelSelect.disabled = false;

        const manualOption = document.createElement("option");
        manualOption.value = MANUAL_ARTIKEL_VALUE;
        manualOption.textContent = "Artikel manuell erfassen...";
        artikelSelect.appendChild(manualOption);

        if (artikelCache[lieferantId]) {
          const items = artikelCache[lieferantId];
          items.forEach((item) => {
            const option = document.createElement("option");
            option.value = item.id;
            const artikelName = String(item.name || `#${item.id}`).trim();
            const artikelNummer = String(item.artikelnummer || "").trim();
            const artikelBeschreibung = String(item.beschreibung || "").trim();
            option.textContent = [
              artikelName,
              artikelBeschreibung || "-",
              artikelNummer ? `Nr: ${artikelNummer}` : "Nr: -",
            ].join(" | ");
            if (selectedId && Number(selectedId) === Number(item.id))
              option.selected = true;
            artikelSelect.appendChild(option);
          });
          // if no items: default to manual
          if (!items.length) {
            manualOption.selected = true;
            artikelSelect.dispatchEvent(new Event("change"));
          }
          return;
        }
        try {
          const res = await fetch(
            `/api/lieferanten/${encodeURIComponent(lieferantId)}/artikel`,
          );
          if (!res.ok) return;
          const items = await res.json();
          artikelCache[lieferantId] = items;
          items.forEach((item) => {
            const option = document.createElement("option");
            option.value = item.id;
            const artikelName = String(item.name || `#${item.id}`).trim();
            const artikelNummer = String(item.artikelnummer || "").trim();
            const artikelBeschreibung = String(item.beschreibung || "").trim();
            option.textContent = [
              artikelName,
              artikelBeschreibung || "-",
              artikelNummer ? `Nr: ${artikelNummer}` : "Nr: -",
            ].join(" | ");
            if (selectedId && Number(selectedId) === Number(item.id))
              option.selected = true;
            artikelSelect.appendChild(option);
          });
          if (!items.length) {
            manualOption.selected = true;
            artikelSelect.dispatchEvent(new Event("change"));
          }
        } catch (e) {
          console.error("Fehler beim Laden der Artikel fuer Lieferant", e);
        }
      };

      const addPositionRow = () => {
        const row = document.createElement("div");
        row.className = "position-row";

        const lieferantSelect = buildSelect(lieferanten, "Lieferant");
        const artikelSelect = buildSelect([], "Artikel");
        artikelSelect.disabled = true;

        const findArtikelBtn = document.createElement("button");
        findArtikelBtn.type = "button";
        findArtikelBtn.className = "btn btn--ghost btn--small";
        findArtikelBtn.textContent = "Artikel finden";
        findArtikelBtn.title = "Artikel über Suche auswählen (Lieferant wird automatisch gesetzt)";
        findArtikelBtn.addEventListener("click", async () => {
          try {
            const selected = await openArtikelSearch();
            if (!selected) return;
            const lid = Number(selected?.lieferantId);
            const aid = Number(selected?.id);
            if (!Number.isFinite(lid) || lid <= 0 || !Number.isFinite(aid) || aid <= 0) {
              return;
            }
            lieferantSelect.value = String(lid);
            // trigger populate
            await populateArtikelForLieferant(artikelSelect, lid, aid);
            artikelSelect.value = String(aid);
            artikelSelect.dispatchEvent(new Event("change"));
          } catch (e) {
            console.error(e);
          }
        });

        const manualWrap = document.createElement("div");
        manualWrap.style.display = "none";
        manualWrap.style.gridColumn = "1 / -1";
        manualWrap.style.padding = "10px 12px";
        manualWrap.style.border = "1px solid rgba(0,0,0,0.08)";
        manualWrap.style.borderRadius = "12px";
        manualWrap.style.background = "#fbf9f6";
        manualWrap.style.display = "none";

        const manualGrid = document.createElement("div");
        manualGrid.style.display = "grid";
        manualGrid.style.gridTemplateColumns = "2fr 1fr";
        manualGrid.style.gap = "8px";

        const manualName = document.createElement("input");
        manualName.type = "text";
        manualName.placeholder = "Artikelbezeichnung (manuell)";
        manualName.setAttribute("data-manual-field", "name");

        const manualPreis = document.createElement("input");
        manualPreis.type = "number";
        manualPreis.min = "0";
        manualPreis.step = "0.01";
        manualPreis.placeholder = "Preis (EUR)";
        manualPreis.setAttribute("data-manual-field", "preis");

        const manualMetaGrid = document.createElement("div");
        manualMetaGrid.style.display = "grid";
        manualMetaGrid.style.gridTemplateColumns = "repeat(4, 1fr)";
        manualMetaGrid.style.gap = "8px";
        manualMetaGrid.style.marginTop = "8px";

        const manualArtikelnummer = document.createElement("input");
        manualArtikelnummer.type = "text";
        manualArtikelnummer.placeholder = "Artikelnummer (optional)";
        manualArtikelnummer.setAttribute("data-manual-field", "artikelnummer");

        const manualEinheit = document.createElement("input");
        manualEinheit.type = "text";
        manualEinheit.placeholder = "Einheit (optional)";
        manualEinheit.setAttribute("data-manual-field", "einheit");

        const manualVe = document.createElement("input");
        manualVe.type = "text";
        manualVe.placeholder = "VE (optional)";
        manualVe.setAttribute("data-manual-field", "ve");

        const manualStd = document.createElement("input");
        manualStd.type = "number";
        manualStd.min = "1";
        manualStd.step = "1";
        manualStd.placeholder = "Standard (optional)";
        manualStd.setAttribute("data-manual-field", "standard");

        manualGrid.appendChild(manualName);
        manualGrid.appendChild(manualPreis);
        manualMetaGrid.appendChild(manualArtikelnummer);
        manualMetaGrid.appendChild(manualEinheit);
        manualMetaGrid.appendChild(manualVe);
        manualMetaGrid.appendChild(manualStd);
        manualWrap.appendChild(manualGrid);
        manualWrap.appendChild(manualMetaGrid);

        lieferantSelect.addEventListener("change", async () => {
          const lid = Number(lieferantSelect.value);
          await populateArtikelForLieferant(artikelSelect, lid);
        });

        const mengeInput = document.createElement("input");
        mengeInput.type = "number";
        mengeInput.min = "1";
        mengeInput.step = "1";
        mengeInput.required = true;
        mengeInput.placeholder = "Menge";
        mengeInput.setAttribute("aria-label", "Menge");
        artikelSelect.addEventListener("change", () => {
          const lid = Number(lieferantSelect.value);
          const aVal = String(artikelSelect.value || "");
          const isManual = aVal === MANUAL_ARTIKEL_VALUE;
          manualWrap.style.display = isManual ? "block" : "none";
          manualName.required = isManual;
          manualPreis.required = isManual;
          if (!isManual) {
            const aid = Number(aVal);
            const artikelInfo = getArtikelByLieferantAndId(lid, aid);
            if (artikelInfo?.standardBestellwert && !Number(mengeInput.value)) {
              mengeInput.value = String(artikelInfo.standardBestellwert);
            }
          }
        });

        const notizInput = document.createElement("input");
        notizInput.type = "text";
        notizInput.placeholder = "Notiz (optional)";
        notizInput.setAttribute("aria-label", "Notiz");

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "btn btn--link";
        removeBtn.textContent = "Entfernen";
        removeBtn.addEventListener("click", () => {
          const confirmed = confirmDoubleDelete(
            "Diese Positionszeile wirklich entfernen?",
            "Positionszeile endgueltig entfernen?",
          );
          if (!confirmed) return;
          row.remove();
          if (!positionenContainer.children.length) {
            addPositionRow();
          }
        });

        row.appendChild(lieferantSelect);
        row.appendChild(artikelSelect);
        row.appendChild(findArtikelBtn);
        row.appendChild(mengeInput);
        row.appendChild(notizInput);
        row.appendChild(removeBtn);
        row.appendChild(manualWrap);
        positionenContainer.appendChild(row);
      };

      const loadData = async () => {
        try {
          const [lieferantenRes, artikelRes] = await Promise.all([
            fetch("/api/lieferanten"),
            fetch("/api/artikel"),
          ]);

          if (!lieferantenRes.ok) {
            throw new Error(await lieferantenRes.text());
          }
          if (!artikelRes.ok) {
            throw new Error(await artikelRes.text());
          }

          lieferanten = await lieferantenRes.json().catch(() => []);
          artikel = await artikelRes.json().catch(() => []);
        } catch (e) {
          console.error("loadData failed", e);
          lieferanten = [];
          artikel = [];
          if (message) {
            message.textContent =
              "Daten konnten nicht geladen werden. Bitte Seite neu laden.";
          }
        } finally {
          try {
            positionenContainer.innerHTML = "";
            addPositionRow();
          } catch (e) {
            console.error("addPositionRow failed", e);
          }
        }
        // load preview for bestellnummer
        const previewEl = document.getElementById("bestellnummerPreview");
        const loadPreview = async () => {
          try {
            const date = bestellDatumInput.value;
            const res = await fetch(
              `/api/bestellungen/next-number?date=${encodeURIComponent(date)}`,
            );
            if (res.ok) {
              const j = await res.json();
              previewEl.textContent = `Voraussichtliche Bestellnummer: ${j.next}`;
            }
          } catch (err) {
            console.error(err);
          }
        };
        loadPreview();
        bestellDatumInput.addEventListener("change", loadPreview);
        bestellDatumInput.addEventListener("input", loadPreview);
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";

        let positionen = Array.from(positionenContainer.children).map(
          (row) => {
            const selects = row.querySelectorAll("select");
            const mengeInput = row.querySelector('input[type="number"]');
            const notizInput = row.querySelector('input[type="text"]');
            const lieferantId = Number(selects[0].value);
            const artikelRaw = String(selects[1].value || "");
            const menge = Number(mengeInput?.value || 0);
            const notiz = String(notizInput?.value || "").trim();
            const manualName = String(
              row.querySelector('input[data-manual-field="name"]')?.value || "",
            ).trim();
            const manualPreisRaw = String(
              row.querySelector('input[data-manual-field="preis"]')?.value || "",
            ).trim();
            const manualArtikelnummer = String(
              row.querySelector('input[data-manual-field="artikelnummer"]')?.value || "",
            ).trim();
            const manualEinheit = String(
              row.querySelector('input[data-manual-field="einheit"]')?.value || "",
            ).trim();
            const manualVe = String(
              row.querySelector('input[data-manual-field="ve"]')?.value || "",
            ).trim();
            const manualStdRaw = String(
              row.querySelector('input[data-manual-field="standard"]')?.value || "",
            ).trim();

            const manual = artikelRaw === MANUAL_ARTIKEL_VALUE;
            const artikelId = manual ? NaN : Number(artikelRaw);
            return {
              lieferantId,
              artikelId,
              menge,
              notiz,
              _manual: manual
                ? {
                    name: manualName,
                    preis: manualPreisRaw,
                    artikelnummer: manualArtikelnummer,
                    einheit: manualEinheit,
                    ve: manualVe,
                    standard: manualStdRaw,
                  }
                : null,
            };
          },
        );

        // Create missing articles from manual entries before creating order
        const createdArtikelIds = [];
        for (const pos of positionen) {
          if (!pos?._manual) continue;
          const lid = Number(pos.lieferantId);
          const name = String(pos._manual.name || "").trim();
          const preis = Number(String(pos._manual.preis || "").replace(",", "."));
          if (!Number.isFinite(lid) || lid <= 0 || !name || !Number.isFinite(preis)) {
            message.textContent =
              "Bitte bei manuellen Artikeln mindestens Lieferant, Artikelbezeichnung und Preis ausfüllen.";
            return;
          }
          const payload = {
            lieferantId: lid,
            name,
            beschreibung: "",
            preis,
            ...(pos._manual.artikelnummer ? { artikelnummer: pos._manual.artikelnummer } : {}),
            ...(pos._manual.einheit ? { einheit: pos._manual.einheit } : {}),
            ...(pos._manual.ve ? { verpackungseinheit: pos._manual.ve } : {}),
            ...(pos._manual.standard && Number(pos._manual.standard) >= 1
              ? { standardBestellwert: Number(pos._manual.standard) }
              : {}),
          };
          try {
            const res = await fetch("/api/artikel", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const txt = await res.text();
              message.textContent = `Artikel anlegen fehlgeschlagen: ${txt}`;
              return;
            }
            const created = await res.json().catch(() => null);
            const newId = Number(created?.id);
            if (!Number.isFinite(newId) || newId <= 0) {
              message.textContent = "Artikel anlegen fehlgeschlagen: keine ID erhalten.";
              return;
            }
            pos.artikelId = newId;
            pos._manual = null;
            createdArtikelIds.push(newId);
            // invalidate cache for supplier so it shows up immediately later
            try {
              delete artikelCache[String(lid)];
              delete artikelCache[lid];
            } catch {}
          } catch (e) {
            console.error(e);
            message.textContent = "Artikel anlegen fehlgeschlagen.";
            return;
          }
        }

        positionen = positionen.map(({ _manual, ...rest }) => rest);

        const payload = {
          bestellDatum: bestellDatumInput.value,
          positionen,
        };

        const response = await fetch("/api/bestellungen", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (response.ok) {
          const result = await response.json();
          const createdList = Array.isArray(result) ? result : [result];
          const selected = createdList
            .filter((item) => item && item.id)
            .sort((a, b) => {
              const nrA = Number(a.bestellnummer ?? a.id ?? 0);
              const nrB = Number(b.bestellnummer ?? b.id ?? 0);
              return nrB - nrA;
            })[0];

          if (selected?.id) {
            // Offer to open newly created articles for completing missing fields
            if (createdArtikelIds.length) {
              try {
                const firstId = createdArtikelIds[0];
                window.open(`/artikel?open=${encodeURIComponent(firstId)}`, "_blank");
              } catch {}
            }
            window.location.href = `/bestellungen?open=${encodeURIComponent(selected.id)}`;
            return;
          }

          // Fallback, falls API unerwartet kein ID-Objekt liefert.
          message.textContent = "Bestellung gespeichert.";
          return;
        }

        const errorText = await response.text();
        message.textContent = `Fehler: ${errorText}`;
      });

      addPositionBtn.addEventListener("click", () => addPositionRow());

      bestellDatumInput.valueAsDate = new Date();
      // Render one row immediately so the form is never "empty"
      try {
        if (positionenContainer && !positionenContainer.children.length) {
          addPositionRow();
        }
      } catch (e) {
        console.error("initial addPositionRow failed", e);
      }
      loadData();
      // Defensive: if something prevented rendering, try again shortly after
      window.setTimeout(() => {
        try {
          if (positionenContainer && !positionenContainer.children.length) {
            addPositionRow();
          }
        } catch (e) {
          console.error("late addPositionRow failed", e);
        }
      }, 300);
    </script>
    <script src="/auth-guard.js"></script>
    <script src="/profile-widget.js"></script>
    <script src="/mobile-nav.js"></script>
  </body>
</html>
