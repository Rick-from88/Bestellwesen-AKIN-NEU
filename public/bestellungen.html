<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bestellungen</title>
    <link rel="stylesheet" href="/static/styles/uebersicht.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1>Bestellungen</h1>
        <p class="hero__subtitle">
          Alle Bestellungen und deren Status im Ueberblick.
        </p>
        <div class="hero__actions">
          <a class="btn btn--primary" href="/bestellung-neu">Neue Bestellung</a>
          <button class="btn btn--primary" id="bestellungenBulkSend">
            Offene Sammelbestellung ausfuehren
          </button>
          <button class="btn btn--ghost" id="bestellungenRefresh">
            Aktualisieren
          </button>
        </div>
      </header>

      <section class="panel">
        <div class="panel__header">
          <div>
            <h2>Alle Bestellungen</h2>
            <div id="bestellungenCount" style="color: var(--ink-soft)">
              Laden...
            </div>
          </div>
          <div class="filter-bar">
            <input
              id="bestellungenSearch"
              type="search"
              placeholder="Suchen (Bestellnr., Artikel, Lieferant ...)"
            />
            <select id="bestellungenErfasserFilter">
              <option value="">Erfasser: alle</option>
            </select>
            <select id="bestellungenStatusFilter">
              <option value="">Status: alle</option>
              <option value="offen">offen</option>
              <option value="bestellt">bestellt</option>
              <option value="geliefert">geliefert</option>
              <option value="storniert">storniert</option>
            </select>
            <select id="bestellungenSort">
              <option value="date-desc">Datum neueste zuerst</option>
              <option value="date-asc">Datum älteste zuerst</option>
              <option value="nr-asc">Bestellnummer aufsteigend</option>
              <option value="nr-desc">Bestellnummer absteigend</option>
            </select>
          </div>
        </div>
        <div class="list" id="bestellungenList"></div>
      </section>
    </div>

    <div class="modal" id="bestellungModal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div class="modal__content" role="dialog" aria-modal="true">
        <div class="modal__header">
          <h2 id="modalTitle">Bestellung bearbeiten</h2>
          <button class="btn btn--link" type="button" id="modalClose">
            Schliessen
          </button>
        </div>
        <form id="bestellungEditForm" class="form">
          <div class="form__row">
            <label for="editStatus">Status</label>
            <select id="editStatus" required>
              <option value="offen">offen</option>
              <option value="bestellt">bestellt</option>
              <option value="geliefert">geliefert</option>
              <option value="storniert">storniert</option>
            </select>
          </div>
          <div class="form__row">
            <label for="editDatum">Bestelldatum</label>
            <input id="editDatum" type="date" required />
          </div>
          <div class="form__row">
            <label>Positionen</label>
            <div id="editPositionen" class="position-list"></div>
            <button class="btn btn--ghost" type="button" id="editAddPosition">
              Position hinzufuegen
            </button>
          </div>
          <div class="form__actions">
            <button class="btn btn--primary" type="submit">Speichern</button>
            <button class="btn btn--danger" type="button" id="editDelete">
              Loeschen
            </button>
            <button
              id="modalSendBtn"
              type="button"
              class="btn btn--primary btn--small"
              title="Senden"
              style="display: none"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M22 2L11 13"
                  stroke="#fff"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M22 2L15 22L11 13L2 9L22 2Z"
                  stroke="#fff"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <button class="btn btn--ghost" type="button" id="editCancel">
              Abbrechen
            </button>
          </div>
          <div id="editMessage" class="form__message" role="status"></div>
        </form>
      </div>
    </div>

    <div class="modal" id="sammelModal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div class="modal__content" role="dialog" aria-modal="true" style="max-width: 760px">
        <div class="modal__header">
          <h2>Sammelbestellung Auswahl</h2>
          <button class="btn btn--link" type="button" id="sammelClose">
            Schliessen
          </button>
        </div>
        <div class="form" style="gap: 10px">
          <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center">
            <button class="btn btn--ghost btn--small" type="button" id="sammelSelectAll">
              Alle waehlen
            </button>
            <button class="btn btn--ghost btn--small" type="button" id="sammelSelectNone">
              Alle abwaehlen
            </button>
            <div id="sammelSelectionInfo" style="color: var(--ink-soft)"></div>
          </div>
          <div id="sammelGroupsList" class="list" style="max-height: 380px; overflow-y: auto"></div>
          <div class="form__actions">
            <button class="btn btn--primary" type="button" id="sammelConfirm">
              Ausgewaehlte senden
            </button>
            <button class="btn btn--ghost" type="button" id="sammelCancel">
              Abbrechen
            </button>
          </div>
        </div>
      </div>
    </div>

    <nav class="navbar">
      <a class="navbar__item" href="/uebersicht">Dashboard</a>
      <a class="navbar__item is-active" href="/bestellungen">Bestellungen</a>
      <a class="navbar__item" href="/lieferanten">Lieferanten</a>
      <a class="navbar__item" href="/artikel">Artikel</a>
      <a class="navbar__item" href="/einstellungen">Einstellungen</a>
    </nav>

    <script>
      const bestellungenList = document.getElementById("bestellungenList");
      const bestellungenCount = document.getElementById("bestellungenCount");
      const bestellungenRefresh = document.getElementById(
        "bestellungenRefresh",
      );
      const bestellungenBulkSend = document.getElementById(
        "bestellungenBulkSend",
      );
      const bestellungenSearch = document.getElementById("bestellungenSearch");
      const bestellungenErfasserFilter = document.getElementById(
        "bestellungenErfasserFilter",
      );
      const bestellungenStatusFilter = document.getElementById(
        "bestellungenStatusFilter",
      );
      const bestellungenSort = document.getElementById("bestellungenSort");
      const bestellungModal = document.getElementById("bestellungModal");
      const modalClose = document.getElementById("modalClose");
      const editForm = document.getElementById("bestellungEditForm");
      const editStatus = document.getElementById("editStatus");
      const editDatum = document.getElementById("editDatum");
      const editPositionen = document.getElementById("editPositionen");
      const editAddPosition = document.getElementById("editAddPosition");
      const editCancel = document.getElementById("editCancel");
      const editDelete = document.getElementById("editDelete");
      const editMessage = document.getElementById("editMessage");
      const modalTitle = document.getElementById("modalTitle");
      const modalSendBtn = document.getElementById("modalSendBtn");
      const sammelModal = document.getElementById("sammelModal");
      const sammelGroupsList = document.getElementById("sammelGroupsList");
      const sammelSelectionInfo = document.getElementById("sammelSelectionInfo");
      const sammelConfirm = document.getElementById("sammelConfirm");
      const sammelCancel = document.getElementById("sammelCancel");
      const sammelClose = document.getElementById("sammelClose");
      const sammelSelectAll = document.getElementById("sammelSelectAll");
      const sammelSelectNone = document.getElementById("sammelSelectNone");

      let bestellungenData = [];
      let artikelData = [];
      let lieferantenData = [];
      let artikelMapGlobal = {};
      let lieferantMapGlobal = {};
      let currentBestellungId = null;
      let sammelCurrentResolver = null;
      let imageModal = null;
      let imageModalImage = null;
      const urlParams = new URLSearchParams(window.location.search);
      let pendingOpenBestellungId = Number(urlParams.get("open") || "");

      const ensureImageModal = () => {
        if (imageModal) return;
        imageModal = document.createElement("div");
        imageModal.className = "modal";
        imageModal.setAttribute("aria-hidden", "true");
        imageModal.innerHTML = `<div class="modal__backdrop"></div><div class="modal__content" role="dialog" aria-modal="true"><div class="modal__header"><h2>Artikelfoto</h2><button class="btn btn--link" type="button" id="bestellungenImageModalClose">Schliessen</button></div><img id="bestellungenImageModalImage" alt="Artikelfoto Grossansicht" style="max-width:100%;width:100%;height:auto;border-radius:12px;" /></div>`;
        document.body.appendChild(imageModal);
        imageModalImage = imageModal.querySelector("#bestellungenImageModalImage");
        imageModal
          .querySelector("#bestellungenImageModalClose")
          .addEventListener("click", () => {
            imageModal.classList.remove("is-open");
            imageModal.setAttribute("aria-hidden", "true");
          });
        imageModal
          .querySelector(".modal__backdrop")
          .addEventListener("click", () => {
            imageModal.classList.remove("is-open");
            imageModal.setAttribute("aria-hidden", "true");
          });
      };

      const statusClass = (status) => {
        if (status === "geliefert") {
          return "pill pill--mint";
        }
        if (status === "storniert") {
          return "pill pill--rose";
        }
        if (status === "bestellt") {
          return "pill pill--blue";
        }
        return "pill pill--amber";
      };

      const formatCurrency = (value) => {
        const amount = Number(value);
        if (!Number.isFinite(amount)) {
          return "-";
        }
        return new Intl.NumberFormat("de-DE", {
          style: "currency",
          currency: "EUR",
        }).format(amount);
      };

      const formatDate = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return "-";
        }
        return date.toLocaleDateString("de-DE");
      };

      const displayNameFromOrder = (bestellung) => {
        const explicitName = String(bestellung?.createdByName || "").trim();
        if (explicitName) return explicitName;

        const email = String(bestellung?.createdByEmail || "").trim();
        if (email && email.includes("@")) {
          const local = email.split("@")[0] || "";
          const firstToken = local
            .split(/[.\-_+]/)
            .map((s) => s.trim())
            .filter(Boolean)[0];
          if (firstToken) {
            return (
              firstToken.charAt(0).toUpperCase() +
              firstToken.slice(1).toLowerCase()
            );
          }
        }

        const uid = String(bestellung?.createdByUid || "").trim();
        return uid || "-";
      };

      const toInputDate = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return "";
        }
        return date.toISOString().slice(0, 10);
      };

      const buildSelect = (items, placeholder, selectedId) => {
        const select = document.createElement("select");
        select.required = true;
        select.setAttribute("aria-label", placeholder);

        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = placeholder;
        select.appendChild(defaultOption);

        items.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.id;
          option.textContent = item.name || `#${item.id}`;
          if (selectedId && Number(selectedId) === Number(item.id)) {
            option.selected = true;
          }
          select.appendChild(option);
        });

        return select;
      };

      const artikelCache = {};
      const getArtikelByLieferantAndId = (lieferantId, artikelId) => {
        const items = artikelCache[lieferantId] || [];
        return items.find((i) => Number(i.id) === Number(artikelId));
      };
      const populateArtikelForLieferant = async (
        artikelSelect,
        lieferantId,
        selectedId,
      ) => {
        artikelSelect.innerHTML = "";
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "Artikel";
        artikelSelect.appendChild(defaultOption);
        if (!lieferantId) {
          artikelSelect.disabled = true;
          return;
        }
        artikelSelect.disabled = false;
        if (artikelCache[lieferantId]) {
          const items = artikelCache[lieferantId];
          items.forEach((item) => {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.name || `#${item.id}`;
            if (selectedId && Number(selectedId) === Number(item.id))
              option.selected = true;
            artikelSelect.appendChild(option);
          });
          return;
        }
        try {
          const res = await fetch(
            `/api/lieferanten/${encodeURIComponent(lieferantId)}/artikel`,
          );
          if (!res.ok) return;
          const items = await res.json();
          artikelCache[lieferantId] = items;
          items.forEach((item) => {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.name || `#${item.id}`;
            if (selectedId && Number(selectedId) === Number(item.id))
              option.selected = true;
            artikelSelect.appendChild(option);
          });
        } catch (e) {
          console.error("Fehler beim Laden der Artikel fuer Lieferant", e);
        }
      };

      const createPositionRow = (position = {}) => {
        const row = document.createElement("div");
        row.className = "position-row";

        const lieferantSelect = buildSelect(
          lieferantenData,
          "Lieferant",
          position.lieferantId,
        );
        const artikelSelect = buildSelect([], "Artikel", position.artikelId);
        artikelSelect.disabled = true;

        lieferantSelect.addEventListener("change", async () => {
          const lid = Number(lieferantSelect.value);
          await populateArtikelForLieferant(artikelSelect, lid);
        });
        // populate if position already has supplier
        if (position.lieferantId) {
          populateArtikelForLieferant(
            artikelSelect,
            position.lieferantId,
            position.artikelId,
          );
        }

        const mengeInput = document.createElement("input");
        mengeInput.type = "number";
        mengeInput.min = "1";
        mengeInput.step = "1";
        mengeInput.required = true;
        mengeInput.placeholder = "Menge";
        mengeInput.setAttribute("aria-label", "Menge");
        if (position.menge) {
          mengeInput.value = position.menge;
        }
        artikelSelect.addEventListener("change", () => {
          const lid = Number(lieferantSelect.value);
          const aid = Number(artikelSelect.value);
          const artikelInfo = getArtikelByLieferantAndId(lid, aid);
          if (artikelInfo?.standardBestellwert && !Number(mengeInput.value)) {
            mengeInput.value = String(artikelInfo.standardBestellwert);
          }
        });

        const notizInput = document.createElement("input");
        notizInput.type = "text";
        notizInput.placeholder = "Notiz (optional)";
        notizInput.setAttribute("aria-label", "Notiz");
        if (position.notiz) {
          notizInput.value = position.notiz;
        }

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "btn btn--link";
        removeBtn.textContent = "Entfernen";
        removeBtn.addEventListener("click", () => {
          row.remove();
          if (!editPositionen.children.length) {
            editPositionen.appendChild(createPositionRow());
          }
        });

        row.appendChild(lieferantSelect);
        row.appendChild(artikelSelect);
        row.appendChild(mengeInput);
        row.appendChild(notizInput);
        row.appendChild(removeBtn);
        return row;
      };

      const openModal = (bestellung) => {
        currentBestellungId = bestellung.id;
        modalTitle.textContent = `Bestellung #${bestellung.bestellnummer ?? bestellung.id} bearbeiten`;
        editStatus.value = bestellung.status || "offen";
        editDatum.value = toInputDate(bestellung.bestellDatum);
        editPositionen.innerHTML = "";

        const positionen = Array.isArray(bestellung.positionen)
          ? bestellung.positionen
          : [];

        if (!positionen.length) {
          editPositionen.appendChild(createPositionRow());
        } else {
          positionen.forEach((position) => {
            editPositionen.appendChild(createPositionRow(position));
          });
        }

        // determine editability: not editable when delivered or cancelled
        const editable = !(
          bestellung.status === "geliefert" || bestellung.status === "storniert"
        );
        // enable/disable add button
        editAddPosition.disabled = !editable;
        // show/hide delete button
        editDelete.style.display = editable ? "" : "none";

        // disable remove buttons and inputs when not editable
        if (!editable) {
          Array.from(
            editPositionen.querySelectorAll("select, input, button"),
          ).forEach((el) => {
            if (el.tagName.toLowerCase() === "button") {
              el.setAttribute("disabled", "true");
            } else {
              el.setAttribute("disabled", "true");
            }
          });
          editMessage.textContent =
            "Diese Bestellung ist abgeschlossen und kann nicht mehr bearbeitet werden. Status kann jedoch geaendert werden.";
        } else {
          editMessage.textContent = "";
        }

        // show send button only when status is 'offen'
        if (modalSendBtn) {
          if ((bestellung.status || "offen") === "offen") {
            modalSendBtn.style.display = "";
            modalSendBtn.disabled = false;
          } else {
            modalSendBtn.style.display = "none";
          }
        }

        bestellungModal.classList.add("is-open");
        bestellungModal.setAttribute("aria-hidden", "false");
      };

      const closeModal = () => {
        bestellungModal.classList.remove("is-open");
        bestellungModal.setAttribute("aria-hidden", "true");
        currentBestellungId = null;
      };

      const openSammelModal = () => {
        if (!sammelModal) return;
        sammelModal.classList.add("is-open");
        sammelModal.setAttribute("aria-hidden", "false");
      };

      const closeSammelModal = () => {
        if (!sammelModal) return;
        sammelModal.classList.remove("is-open");
        sammelModal.setAttribute("aria-hidden", "true");
        if (sammelGroupsList) sammelGroupsList.innerHTML = "";
        if (sammelSelectionInfo) sammelSelectionInfo.textContent = "";
      };

      const updateSammelSelectionInfo = () => {
        if (!sammelSelectionInfo || !sammelGroupsList) return;
        const all = Array.from(
          sammelGroupsList.querySelectorAll('input[type="checkbox"][data-order-id]'),
        );
        const selected = all.filter((el) => el.checked).length;
        sammelSelectionInfo.textContent = `${selected} von ${all.length} Bestellungen ausgewaehlt`;
      };

      const resolveSammelSelection = (value) => {
        if (typeof sammelCurrentResolver === "function") {
          sammelCurrentResolver(value);
        }
        sammelCurrentResolver = null;
        closeSammelModal();
      };

      const openSammelSelectionDialog = (preview) =>
        new Promise((resolve) => {
          if (!sammelModal || !sammelGroupsList || !sammelConfirm) {
            resolve(null);
            return;
          }
          sammelCurrentResolver = resolve;
          sammelGroupsList.innerHTML = "";
          const groups = Array.isArray(preview?.groups) ? preview.groups : [];

          groups.forEach((g) => {
            const box = document.createElement("div");
            box.className = "list__row";
            box.style.display = "grid";
            box.style.gap = "8px";
            const header = document.createElement("div");
            header.className = "list__title";
            header.textContent = `${g.lieferantName} (${g.anzahlBestellungen} Bestellungen)`;
            box.appendChild(header);

            const orderWrap = document.createElement("div");
            orderWrap.style.display = "grid";
            orderWrap.style.gap = "6px";

            const orders =
              Array.isArray(g.orders) && g.orders.length
                ? g.orders
                : Array.isArray(g.orderIds)
                  ? g.orderIds.map((id, idx) => ({
                      orderId: Number(id),
                      bestellnummer: Array.isArray(g.bestellnummern)
                        ? String(g.bestellnummern[idx] || id)
                        : String(id),
                      anzahlPositionen: 0,
                      summe: null,
                      bestellDatum: null,
                      createdByName: null,
                    }))
                  : [];
            orders.forEach((o) => {
              const row = document.createElement("label");
              row.style.display = "grid";
              row.style.gap = "8px";
              row.style.cursor = "pointer";
              row.style.padding = "8px 10px";
              row.style.border = "1px solid rgba(0,0,0,0.08)";
              row.style.borderRadius = "10px";
              row.style.background = "#fff";
              row.style.gridTemplateColumns = "20px 1fr";
              row.style.alignItems = "start";
              const cb = document.createElement("input");
              cb.type = "checkbox";
              cb.checked = true;
              cb.setAttribute("data-order-id", String(o.orderId));
              cb.addEventListener("change", updateSammelSelectionInfo);
              cb.style.marginTop = "2px";

              const info = document.createElement("div");
              const title = document.createElement("div");
              title.className = "list__title";
              title.style.fontSize = "1rem";
              title.textContent = `#${o.bestellnummer} (${o.anzahlPositionen} Positionen)`;
              const meta = document.createElement("div");
              meta.className = "list__meta";
              const datumTxt = o.bestellDatum ? formatDate(o.bestellDatum) : "-";
              const erfasserTxt = o.createdByName ? String(o.createdByName) : "-";
              const sumTxt =
                typeof o.summe === "number" ? formatCurrency(o.summe) : "-";
              meta.textContent = `Datum: ${datumTxt} | Erfasst von: ${erfasserTxt} | Summe: ${sumTxt}`;
              info.appendChild(title);
              info.appendChild(meta);

              row.appendChild(cb);
              row.appendChild(info);
              orderWrap.appendChild(row);
            });

            box.appendChild(orderWrap);
            sammelGroupsList.appendChild(box);
          });

          updateSammelSelectionInfo();
          openSammelModal();
        });

      const renderBestellungen = (bestellungen, artikelMap, lieferantMap) => {
        bestellungenList.innerHTML = "";
        bestellungenCount.textContent = `${bestellungen.length} Bestellungen`;

        if (!bestellungen.length) {
          const emptyRow = document.createElement("div");
          emptyRow.className = "list__row";
          emptyRow.textContent = "Keine Bestellungen vorhanden.";
          bestellungenList.appendChild(emptyRow);
          return;
        }

        bestellungen.forEach((bestellung) => {
          const group = document.createElement("div");
          group.className = "order-group";
          group.classList.toggle("is-open", false);

          const headerRow = document.createElement("div");
          headerRow.className = "list__row list__row--clickable";

          const leftDiv = document.createElement("div");
          const title = document.createElement("div");
          title.className = "list__title";
          title.textContent = `Bestellung #${bestellung.bestellnummer ?? bestellung.id}`;

          const meta = document.createElement("div");
          meta.className = "list__meta";
          const datum = formatDate(bestellung.bestellDatum);
          const positionen = Array.isArray(bestellung.positionen)
            ? bestellung.positionen
            : [];
          const lieferantName = positionen.length
            ? lieferantMap[positionen[0].lieferantId] ||
              `Lieferant #${positionen[0].lieferantId}`
            : "Unbekannt";

          const artikelNamen = positionen.map((position) => {
            const artikelInfo = artikelMap[position.artikelId];
            return artikelInfo?.name || `Artikel #${position.artikelId}`;
          });
          const artikelSummary = artikelNamen.length
            ? artikelNamen.slice(0, 3).join(", ") +
              (artikelNamen.length > 3 ? ` +${artikelNamen.length - 3}` : "")
            : "-";
          const createdBy = displayNameFromOrder(bestellung);

          // Gesamtpreis aller Positionen der Bestellung berechnen
          const totalBestellung = positionen.reduce((sum, pos) => {
            const a = artikelMap[pos.artikelId];
            const preis = a?.preis ?? 0;
            const menge = Number(pos.menge) || 0;
            return sum + preis * menge;
          }, 0);

          meta.innerHTML = `Datum: ${datum} | Erfasst von: ${createdBy} | Lieferant: ${lieferantName} | Artikel: ${artikelSummary} | Gesamt: <span class="order-total">${formatCurrency(totalBestellung)}</span>`;

          leftDiv.appendChild(title);
          leftDiv.appendChild(meta);
          headerRow.appendChild(leftDiv);
          const statusEl = document.createElement("div");
          statusEl.className = statusClass(bestellung.status);
          statusEl.textContent = (bestellung.status || "offen").toUpperCase();
          headerRow.appendChild(statusEl);
          group.appendChild(headerRow);

          let clickTimeout = null;
          headerRow.addEventListener("click", () => {
            clickTimeout = setTimeout(() => {
              group.classList.toggle("is-open");
            }, 200);
          });

          headerRow.addEventListener("dblclick", () => {
            if (clickTimeout) {
              clearTimeout(clickTimeout);
            }
            openModal(bestellung);
          });

          const itemsContainer = document.createElement("div");
          itemsContainer.className = "order-items";

          if (!positionen.length) {
            const emptyRow = document.createElement("div");
            emptyRow.className = "list__row list__row--sub";
            emptyRow.textContent = "Keine Positionen vorhanden.";
            itemsContainer.appendChild(emptyRow);
          } else {
            positionen.forEach((position) => {
              const row = document.createElement("div");
              row.className = "list__row list__row--sub";

              const posLeft = document.createElement("div");
              const posTitle = document.createElement("div");
              posTitle.className = "list__title";
              const artikelInfo = artikelMap[position.artikelId];
              const artikelName =
                artikelInfo?.name || `Artikel #${position.artikelId}`;
              if (artikelInfo?.fotoUrl) {
                const thumb = document.createElement("img");
                thumb.src = artikelInfo.fotoUrl;
                thumb.alt = artikelName;
                thumb.style.width = "36px";
                thumb.style.height = "36px";
                thumb.style.objectFit = "cover";
                thumb.style.borderRadius = "8px";
                thumb.style.marginRight = "8px";
                thumb.style.verticalAlign = "middle";
                thumb.style.cursor = "zoom-in";
                thumb.addEventListener("click", (e) => {
                  e.stopPropagation();
                  ensureImageModal();
                  imageModalImage.src = artikelInfo.fotoUrl;
                  imageModal.classList.add("is-open");
                  imageModal.setAttribute("aria-hidden", "false");
                });
                posTitle.appendChild(thumb);
              }
              posTitle.appendChild(document.createTextNode(artikelName));

              const posMeta = document.createElement("div");
              posMeta.className = "list__meta";
              const preis = artikelInfo?.preis ?? 0;
              const menge = Number(position.menge) || 0;
              const gesamtPos = preis * menge;
              const notiz = String(position.notiz || "").trim();
              const notizPart = notiz
                ? ` | <strong>Notiz:</strong> <strong>${notiz}</strong>`
                : "";
              posMeta.innerHTML = `Artikelnummer: ${position.artikelId} | Preis: ${formatCurrency(preis)} | Menge: ${menge}${notizPart} | Gesamt: <span class="position-total">${formatCurrency(gesamtPos)}</span>`;

              posLeft.appendChild(posTitle);
              posLeft.appendChild(posMeta);
              row.appendChild(posLeft);
              itemsContainer.appendChild(row);
            });
          }

          group.appendChild(itemsContainer);

          // no per-row action buttons here (send moved to modal)

          bestellungenList.appendChild(group);

          if (
            Number.isFinite(pendingOpenBestellungId) &&
            pendingOpenBestellungId > 0 &&
            Number(bestellung.id) === pendingOpenBestellungId
          ) {
            group.classList.add("is-open");
            openModal(bestellung);
            pendingOpenBestellungId = NaN;
            const cleanUrl = `${window.location.pathname}${window.location.hash || ""}`;
            window.history.replaceState({}, "", cleanUrl);
          }
        });
      };

      const applyBestellungenFilterAndSort = () => {
        const artikelMap = artikelMapGlobal;
        const lieferantMap = lieferantMapGlobal;
        const term = (bestellungenSearch?.value || "").toLowerCase().trim();
        const erfasserFilter = (bestellungenErfasserFilter?.value || "").trim();
        const statusFilter = bestellungenStatusFilter?.value || "";
        const sort = bestellungenSort?.value || "date-desc";

        // defensiv: je nach JSON-Form (Array vs. Objekt { value }) normalisieren
        let list = Array.isArray(bestellungenData) ? [...bestellungenData] : [];

        if (statusFilter) {
          list = list.filter((b) => (b.status || "offen") === statusFilter);
        }
        if (erfasserFilter) {
          list = list.filter(
            (b) => displayNameFromOrder(b).toLowerCase() === erfasserFilter.toLowerCase(),
          );
        }

        if (term) {
          list = list.filter((b) => {
            // JS: `??` nicht ohne Klammern mit `||` mischen; daher nur `??`
            const nr = String(b.bestellnummer ?? b.id ?? "").toLowerCase();
            const status = String(b.status || "").toLowerCase();
            const datum = String(b.bestellDatum || "").toLowerCase();
            const positionen = Array.isArray(b.positionen) ? b.positionen : [];
            const artikelNamen = positionen
              .map((p) => artikelMap[p.artikelId]?.name || "")
              .join(" ")
              .toLowerCase();
            const lieferantenNamen = positionen
              .map((p) => lieferantMap[p.lieferantId] || "")
              .join(" ")
              .toLowerCase();
            const notizen = positionen
              .map((p) => p.notiz || "")
              .join(" ")
              .toLowerCase();
            const createdBy = displayNameFromOrder(b).toLowerCase();
            const haystack =
              nr +
              " " +
              status +
              " " +
              datum +
              " " +
              artikelNamen +
              " " +
              lieferantenNamen +
              " " +
              notizen +
              " " +
              createdBy;
            return haystack.includes(term);
          });
        }

        list.sort((a, b) => {
          const dateA = new Date(a.bestellDatum || 0).getTime();
          const dateB = new Date(b.bestellDatum || 0).getTime();
          const nrA = Number(a.bestellnummer ?? a.id ?? 0);
          const nrB = Number(b.bestellnummer ?? b.id ?? 0);
          switch (sort) {
            case "date-asc":
              return dateA - dateB;
            case "nr-asc":
              return nrA - nrB;
            case "nr-desc":
              return nrB - nrA;
            default:
              return dateB - dateA;
          }
        });

        renderBestellungen(list, artikelMap, lieferantMap);
      };

      const loadBestellungen = async () => {
        try {
          const [bestellungenRes, artikelRes, lieferantenRes] =
            await Promise.all([
              fetch("/api/bestellungen"),
              fetch("/api/artikel"),
              fetch("/api/lieferanten"),
            ]);

          const rawBestellungen = await bestellungenRes.json();
          bestellungenData = Array.isArray(rawBestellungen)
            ? rawBestellungen
            : (rawBestellungen?.value && Array.isArray(rawBestellungen.value)
                ? rawBestellungen.value
                : []);
          const artikelResponse = await artikelRes.json();
          const lieferantenResponse = await lieferantenRes.json();

          artikelData = Array.isArray(artikelResponse)
            ? artikelResponse
            : artikelResponse.value || [];
          lieferantenData = Array.isArray(lieferantenResponse)
            ? lieferantenResponse
            : lieferantenResponse.value || [];

          artikelMapGlobal = artikelData.reduce((acc, item) => {
            acc[item.id] = {
              name: item.name,
              preis: item.preis,
              standardBestellwert: item.standardBestellwert,
              fotoUrl: item.fotoUrl,
            };
            return acc;
          }, {});

          lieferantMapGlobal = lieferantenData.reduce((acc, item) => {
            acc[item.id] = item.name;
            return acc;
          }, {});

          if (bestellungenErfasserFilter) {
            const previous = bestellungenErfasserFilter.value || "";
            const uniqueErfasser = Array.from(
              new Set(
                bestellungenData
                  .map((b) => displayNameFromOrder(b))
                  .filter((v) => String(v || "").trim() && v !== "-"),
              ),
            ).sort((a, b) => a.localeCompare(b, "de"));
            bestellungenErfasserFilter.innerHTML =
              '<option value="">Erfasser: alle</option>';
            uniqueErfasser.forEach((name) => {
              const option = document.createElement("option");
              option.value = name;
              option.textContent = `Erfasser: ${name}`;
              if (previous && previous === name) option.selected = true;
              bestellungenErfasserFilter.appendChild(option);
            });
          }

          applyBestellungenFilterAndSort();
        } catch (error) {
          console.error("Fehler beim Laden der Bestellungen:", error);
          bestellungenCount.textContent = "Fehler beim Laden";
        }
      };

      const runSammelbestellung = async () => {
        if (!bestellungenBulkSend) return;
        try {
          bestellungenBulkSend.disabled = true;
          bestellungenBulkSend.textContent = "Pruefe offene Bestellungen...";
          const previewRes = await fetch("/api/bestellungen/sammel/preview");
          if (!previewRes.ok) {
            const txt = await previewRes.text();
            alert(`Sammelvorschau fehlgeschlagen: ${txt}`);
            return;
          }
          const preview = await previewRes.json();
          const groups = Array.isArray(preview.groups) ? preview.groups : [];
          if (!groups.length) {
            alert("Keine offenen Bestellungen fuer Sammelbestellung vorhanden.");
            return;
          }
          const lines = groups
            .slice(0, 10)
            .map(
              (g) =>
                `- ${g.lieferantName}: ${g.anzahlBestellungen} Bestellungen, ${g.anzahlPositionen} Positionen`,
            )
            .join("\n");
          const more = groups.length > 10 ? `\n... +${groups.length - 10} weitere` : "";
          const preOk = window.confirm(
            `Sammelbestellung vorbereiten?\n\nLieferanten: ${preview.totalGroups}\nBestellungen: ${preview.totalOrders}\n\n${lines}${more}\n\nDanach kannst du einzelne Bestellungen auswaehlen.`,
          );
          if (!preOk) return;

          const selectedOrderIds = await openSammelSelectionDialog(preview);
          if (!Array.isArray(selectedOrderIds)) return;
          if (!selectedOrderIds.length) {
            alert("Bitte mindestens eine Bestellung auswaehlen.");
            return;
          }

          bestellungenBulkSend.textContent = "Sammelbestellung wird gesendet...";
          const sendRes = await fetch("/api/bestellungen/sammel/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ orderIds: selectedOrderIds }),
          });
          const sendJson = await sendRes.json().catch(() => null);
          if (!sendRes.ok) {
            const detail = sendJson?.detail ? `\n${sendJson.detail}` : "";
            alert(
              `Sammelbestellung fehlgeschlagen: ${sendJson?.error || sendRes.status}${detail}`,
            );
            return;
          }

          alert(
            `Sammelbestellung erfolgreich.\nVersendete Lieferanten: ${sendJson?.sentGroups || 0}\nAktualisierte Bestellungen: ${sendJson?.updatedOrders || 0}`,
          );
          await loadBestellungen();
        } catch (e) {
          console.error(e);
          alert("Sammelbestellung konnte nicht ausgefuehrt werden.");
        } finally {
          if (bestellungenBulkSend) {
            bestellungenBulkSend.disabled = false;
            bestellungenBulkSend.textContent =
              "Offene Sammelbestellung ausfuehren";
          }
        }
      };

      const initRoleBasedActions = async () => {
        if (!bestellungenBulkSend) return;
        try {
          const res = await fetch("/api/auth/me");
          if (!res.ok) return;
          const me = await res.json();
          const role = String(me?.role || "");
          if (role === "produktion") {
            bestellungenBulkSend.style.display = "none";
          }
        } catch {
          // ignore
        }
      };

      editAddPosition.addEventListener("click", () => {
        editPositionen.appendChild(createPositionRow());
      });

      editCancel.addEventListener("click", closeModal);
      modalClose.addEventListener("click", closeModal);
      bestellungModal
        .querySelector(".modal__backdrop")
        .addEventListener("click", closeModal);

      editForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        editMessage.textContent = "";

        const positionen = Array.from(editPositionen.children).map((row) => {
          const selects = row.querySelectorAll("select");
          const mengeInput = row.querySelector('input[type="number"]');
          const notizInput = row.querySelector('input[type="text"]');
          return {
            lieferantId: Number(selects[0].value),
            artikelId: Number(selects[1].value),
            menge: Number(mengeInput?.value || 0),
            notiz: String(notizInput?.value || "").trim(),
          };
        });
        // if positions are not editable, only change status via status endpoint
        if (editAddPosition.disabled) {
          try {
            const res = await fetch(
              `/api/bestellungen/${currentBestellungId}/status`,
              {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status: editStatus.value }),
              },
            );
            if (!res.ok) {
              const txt = await res.text();
              editMessage.textContent = `Fehler: ${txt}`;
              return;
            }
            closeModal();
            loadBestellungen();
          } catch (e) {
            console.error(e);
            editMessage.textContent = "Speichern fehlgeschlagen.";
          }
          return;
        }

        if (
          !positionen.length ||
          positionen.some(
            (pos) => !pos.lieferantId || !pos.artikelId || !pos.menge,
          )
        ) {
          editMessage.textContent = "Bitte alle Positionen ausfuellen.";
          return;
        }

        const payload = {
          status: editStatus.value,
          bestellDatum: editDatum.value,
          positionen,
        };

        try {
          const response = await fetch(
            `/api/bestellungen/${currentBestellungId}`,
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            },
          );

          if (!response.ok) {
            const errorText = await response.text();
            editMessage.textContent = `Fehler: ${errorText}`;
            return;
          }

          closeModal();
          loadBestellungen();
        } catch (error) {
          console.error("Fehler beim Speichern:", error);
          editMessage.textContent = "Speichern fehlgeschlagen.";
        }
      });

      editDelete.addEventListener("click", async () => {
        if (!currentBestellungId) {
          return;
        }

        const confirmed = window.confirm(
          "Soll diese Bestellung wirklich geloescht werden?",
        );
        if (!confirmed) {
          return;
        }

        try {
          const response = await fetch(
            `/api/bestellungen/${currentBestellungId}`,
            { method: "DELETE" },
          );

          if (!response.ok) {
            const errorText = await response.text();
            editMessage.textContent = `Fehler: ${errorText}`;
            return;
          }

          closeModal();
          loadBestellungen();
        } catch (error) {
          console.error("Fehler beim Loeschen:", error);
          editMessage.textContent = "Loeschen fehlgeschlagen.";
        }
      });

      if (modalSendBtn) {
        modalSendBtn.addEventListener("click", async (e) => {
          e.preventDefault();
          if (!currentBestellungId) return;
          modalSendBtn.disabled = true;
          const original = modalSendBtn.innerHTML;
          modalSendBtn.innerHTML = "Sende...";
          try {
            const res = await fetch(
              `/api/bestellungen/${currentBestellungId}/send`,
              { method: "PUT" },
            );
            if (!res.ok) {
              const txt = await res.text();
              alert("Senden fehlgeschlagen: " + txt);
              modalSendBtn.disabled = false;
              modalSendBtn.innerHTML = original;
              return;
            }
            closeModal();
            await loadBestellungen();
          } catch (err) {
            console.error(err);
            alert("Senden fehlgeschlagen");
            modalSendBtn.disabled = false;
            modalSendBtn.innerHTML = original;
          }
        });
      }

      bestellungenRefresh.addEventListener("click", () => {
        if (bestellungenSearch) bestellungenSearch.value = "";
        if (bestellungenErfasserFilter) bestellungenErfasserFilter.value = "";
        if (bestellungenStatusFilter) bestellungenStatusFilter.value = "";
        if (bestellungenSort) bestellungenSort.value = "date-desc";
        loadBestellungen();
      });
      if (bestellungenSearch) {
        bestellungenSearch.addEventListener("input", applyBestellungenFilterAndSort);
      }
      if (bestellungenErfasserFilter) {
        bestellungenErfasserFilter.addEventListener(
          "change",
          applyBestellungenFilterAndSort,
        );
      }
      if (bestellungenStatusFilter) {
        bestellungenStatusFilter.addEventListener(
          "change",
          applyBestellungenFilterAndSort,
        );
      }
      if (bestellungenSort) {
        bestellungenSort.addEventListener("change", applyBestellungenFilterAndSort);
      }
      if (bestellungenBulkSend) {
        bestellungenBulkSend.addEventListener("click", runSammelbestellung);
      }
      if (sammelCancel) {
        sammelCancel.addEventListener("click", () => resolveSammelSelection(null));
      }
      if (sammelClose) {
        sammelClose.addEventListener("click", () => resolveSammelSelection(null));
      }
      if (sammelModal) {
        const backdrop = sammelModal.querySelector(".modal__backdrop");
        if (backdrop) {
          backdrop.addEventListener("click", () => resolveSammelSelection(null));
        }
      }
      if (sammelSelectAll) {
        sammelSelectAll.addEventListener("click", () => {
          if (!sammelGroupsList) return;
          sammelGroupsList
            .querySelectorAll('input[type="checkbox"][data-order-id]')
            .forEach((el) => {
              el.checked = true;
            });
          updateSammelSelectionInfo();
        });
      }
      if (sammelSelectNone) {
        sammelSelectNone.addEventListener("click", () => {
          if (!sammelGroupsList) return;
          sammelGroupsList
            .querySelectorAll('input[type="checkbox"][data-order-id]')
            .forEach((el) => {
              el.checked = false;
            });
          updateSammelSelectionInfo();
        });
      }
      if (sammelConfirm) {
        sammelConfirm.addEventListener("click", () => {
          if (!sammelGroupsList) {
            resolveSammelSelection(null);
            return;
          }
          const selected = Array.from(
            sammelGroupsList.querySelectorAll(
              'input[type="checkbox"][data-order-id]',
            ),
          )
            .filter((el) => el.checked)
            .map((el) => Number(el.getAttribute("data-order-id")))
            .filter((v) => Number.isFinite(v) && v > 0);
          resolveSammelSelection(selected);
        });
      }
      initRoleBasedActions();
      loadBestellungen();
    </script>
    <script src="/static/profile-widget.js"></script>
    <script src="/static/mobile-nav.js"></script>
  </body>
</html>
