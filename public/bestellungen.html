<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Bestellungen</title>
    <link rel="stylesheet" href="/static/styles/uebersicht.css" />
    <link
      rel="stylesheet"
      href="/vendor/shepherd/shepherd.css"
    />
    <script src="/vendor/popper/popper.min.js"></script>
    <script src="/vendor/shepherd/shepherd.min.js"></script>
    <script src="/tour.js" defer></script>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1>Bestellungen</h1>
        <p class="hero__subtitle">
          Alle Bestellungen und deren Status im Ueberblick.
        </p>
        <div class="hero__actions">
          <a class="btn btn--primary" href="/bestellung-neu">Neue Bestellung</a>
          <button class="btn btn--primary" id="bestellungenBulkSend">
            Offene Sammelbestellung ausfuehren
          </button>
          <button class="btn btn--ghost" id="bestellungenRefresh">
            Aktualisieren
          </button>
        </div>
      </header>

      <section class="panel">
        <div class="panel__header">
          <div>
            <h2>Alle Bestellungen</h2>
            <div id="bestellungenCount" style="color: var(--ink-soft)">
              Laden...
            </div>
          </div>
          <div class="filter-bar">
            <input
              id="bestellungenSearch"
              type="search"
              placeholder="Suchen (Bestellnr., Artikel, Lieferant ...)"
            />
            <select id="bestellungenErfasserFilter">
              <option value="">Erfasser: alle</option>
            </select>
            <select id="bestellungenStatusFilter">
              <option value="">Status: alle</option>
              <option value="offen">offen</option>
              <option value="bestellt">bestellt</option>
              <option value="geliefert">geliefert</option>
              <option value="storniert">storniert</option>
            </select>
            <select id="bestellungenSort">
              <option value="date-desc">Datum neueste zuerst</option>
              <option value="date-asc">Datum älteste zuerst</option>
              <option value="lieferant-asc">Lieferant A–Z</option>
              <option value="lieferant-desc">Lieferant Z–A</option>
            </select>
          </div>
        </div>
        <div class="list" id="bestellungenList"></div>
      </section>
    </div>

    <div class="modal" id="bestellungModal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div class="modal__content" role="dialog" aria-modal="true">
        <div class="modal__header">
          <h2 id="modalTitle">Bestellung bearbeiten</h2>
          <button class="btn btn--link" type="button" id="modalClose">
            Schliessen
          </button>
        </div>
        <form id="bestellungEditForm" class="form">
          <div class="form__row">
            <label for="editStatus">Status</label>
            <select id="editStatus" required>
              <option value="offen">offen</option>
              <option value="bestellt">bestellt</option>
              <option value="teilgeliefert">teilgeliefert</option>
              <option value="geliefert">geliefert</option>
              <option value="teilstorniert">teilstorniert</option>
              <option value="storniert">storniert</option>
            </select>
          </div>
          <div class="form__row">
            <label for="editAuftragsBestaetigt"
              >Auftragsbestaetigung erhalten</label
            >
            <input id="editAuftragsBestaetigt" type="checkbox" />
          </div>
          <div class="form__row">
            <label for="editDatum">Bestelldatum</label>
            <input id="editDatum" type="date" required />
          </div>
          <div class="form__row">
            <label>Positionen</label>
            <div id="editPositionen" class="position-list"></div>
            <button class="btn btn--ghost" type="button" id="editAddPosition">
              Position hinzufuegen
            </button>
          </div>
          <div class="form__actions">
            <button class="btn btn--primary" type="submit">Speichern</button>
            <button class="btn btn--danger" type="button" id="editDelete">
              Loeschen
            </button>
            <button
              id="modalSendBtn"
              type="button"
              class="btn btn--primary btn--small"
              title="Vorschau anzeigen"
              style="display: none"
            >
              Vorschau anzeigen
            </button>
            <button
              id="modalReminderBtn"
              type="button"
              class="btn btn--ghost btn--small"
              title="Vorschau anzeigen (Reminder)"
              style="display: none"
            >
              Vorschau anzeigen (Reminder)
            </button>
            <button class="btn btn--ghost" type="button" id="editCancel">
              Abbrechen
            </button>
          </div>
          <div id="editMessage" class="form__message" role="status"></div>
        </form>
      </div>
    </div>

    <div class="modal modal--maildraft" id="mailDraftModal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div
        class="modal__content modal__content--wide"
        role="dialog"
        aria-modal="true"
      >
        <div class="modal__header">
          <h2 id="mailDraftTitle">E-Mail vor dem Senden prüfen</h2>
          <button class="btn btn--link" type="button" id="mailDraftClose">
            Schliessen
          </button>
        </div>
        <div class="form" style="padding: 16px">
          <div class="form__row">
            <label for="mailDraftTo">Empfänger</label>
            <input id="mailDraftTo" type="text" placeholder="name@firma.de" />
            <div class="list__meta" id="mailDraftToHint" style="margin-top: 6px"></div>
          </div>
          <div class="form__row">
            <label for="mailDraftSubject">Betreff</label>
            <input id="mailDraftSubject" type="text" />
          </div>
          <div class="mail-draft-split">
            <div class="form__row form__row--stack" style="margin: 0">
              <label for="mailDraftHtml">Mail-Text (HTML erlaubt)</label>
              <textarea id="mailDraftHtml" rows="14"></textarea>
            </div>
            <div class="form__row form__row--stack" style="margin: 0">
              <label>Vorschau</label>
              <div id="mailDraftPreview" class="mail-draft-preview"></div>
            </div>
          </div>

          <div class="form__actions" style="margin-top: 12px">
            <button class="btn btn--primary" type="button" id="mailDraftSendBtn">
              Jetzt senden
            </button>
            <button class="btn btn--ghost" type="button" id="mailDraftCancelBtn">
              Abbrechen
            </button>
            <div id="mailDraftStatus" class="form__message" role="status"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal" id="sammelModal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div
        class="modal__content modal__content--narrow"
        role="dialog"
        aria-modal="true"
      >
        <div class="modal__header">
          <h2>Sammelbestellung Auswahl</h2>
          <button class="btn btn--link" type="button" id="sammelClose">
            Schliessen
          </button>
        </div>
        <div class="form" style="gap: 10px">
          <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center">
            <button class="btn btn--ghost btn--small" type="button" id="sammelSelectAll">
              Alle waehlen
            </button>
            <button class="btn btn--ghost btn--small" type="button" id="sammelSelectNone">
              Alle abwaehlen
            </button>
            <div id="sammelSelectionInfo" style="color: var(--ink-soft)"></div>
          </div>
          <div id="sammelGroupsList" class="list" style="max-height: 380px; overflow-y: auto"></div>
          <div class="form__actions">
            <button class="btn btn--primary" type="button" id="sammelConfirm">
              Vorschau anzeigen
            </button>
            <button class="btn btn--ghost" type="button" id="sammelCancel">
              Abbrechen
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal modal--maildraft" id="sammelMailDraftModal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div
        class="modal__content modal__content--wide"
        role="dialog"
        aria-modal="true"
      >
        <div class="modal__header">
          <h2>Sammelbestellung: E-Mails prüfen</h2>
          <button class="btn btn--link" type="button" id="sammelMailClose">
            Schliessen
          </button>
        </div>
        <div class="form" style="padding: 16px; gap: 12px">
          <div class="list__meta" id="sammelMailMeta"></div>
          <div class="sammel-mail-layout">
            <div class="sammel-mail-side">
              <div style="padding: 10px 12px; font-weight: 700; border-bottom: 1px solid rgba(0,0,0,0.06)">
                Lieferanten
              </div>
              <div
                id="sammelMailList"
                class="list"
                style="max-height: 520px; overflow-y: auto"
              ></div>
            </div>

            <div style="display: grid; gap: 10px; min-width: 0">
              <div class="form__row">
                <label for="sammelMailTo">Empfänger</label>
                <input id="sammelMailTo" type="text" />
              </div>
              <div class="form__row">
                <label for="sammelMailSubject">Betreff</label>
                <input id="sammelMailSubject" type="text" />
              </div>
              <div class="sammel-mail-editor-split">
                <div class="form__row form__row--stack" style="margin: 0">
                  <label for="sammelMailHtml">Mail-Text (HTML erlaubt)</label>
                  <textarea id="sammelMailHtml" rows="14"></textarea>
                </div>
                <div class="form__row form__row--stack" style="margin: 0">
                  <label>Vorschau</label>
                  <div id="sammelMailPreview" class="mail-draft-preview"></div>
                </div>
              </div>

              <div class="form__actions" style="margin-top: 4px">
                <button class="btn btn--primary" type="button" id="sammelMailSendAll">
                  Alles senden
                </button>
                <button class="btn btn--ghost" type="button" id="sammelMailCancel">
                  Abbrechen
                </button>
                <div id="sammelMailStatus" class="form__message" role="status"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <nav class="navbar">
      <a class="navbar__item" href="/uebersicht">Dashboard</a>
      <a class="navbar__item is-active" href="/bestellungen">Bestellungen</a>
      <a class="navbar__item" href="/lieferanten">Lieferanten</a>
      <a class="navbar__item" href="/artikel">Artikel</a>
      <a class="navbar__item" href="/einstellungen">Einstellungen</a>
    </nav>

    <script>
      const bestellungenList = document.getElementById("bestellungenList");
      const bestellungenCount = document.getElementById("bestellungenCount");
      const bestellungenRefresh = document.getElementById(
        "bestellungenRefresh",
      );
      const bestellungenBulkSend = document.getElementById(
        "bestellungenBulkSend",
      );
      const bestellungenSearch = document.getElementById("bestellungenSearch");
      const bestellungenErfasserFilter = document.getElementById(
        "bestellungenErfasserFilter",
      );
      const bestellungenStatusFilter = document.getElementById(
        "bestellungenStatusFilter",
      );
      const bestellungenSort = document.getElementById("bestellungenSort");
      const bestellungModal = document.getElementById("bestellungModal");
      const modalClose = document.getElementById("modalClose");
      const editForm = document.getElementById("bestellungEditForm");
      const editStatus = document.getElementById("editStatus");
      const editDatum = document.getElementById("editDatum");
      const editAuftragsBestaetigt = document.getElementById(
        "editAuftragsBestaetigt",
      );
      const editPositionen = document.getElementById("editPositionen");
      const editAddPosition = document.getElementById("editAddPosition");
      const editCancel = document.getElementById("editCancel");
      const editDelete = document.getElementById("editDelete");
      const editMessage = document.getElementById("editMessage");
      const modalTitle = document.getElementById("modalTitle");
      const modalSendBtn = document.getElementById("modalSendBtn");
      const modalReminderBtn = document.getElementById("modalReminderBtn");
      const sammelModal = document.getElementById("sammelModal");
      const sammelGroupsList = document.getElementById("sammelGroupsList");
      const sammelSelectionInfo = document.getElementById("sammelSelectionInfo");
      const sammelConfirm = document.getElementById("sammelConfirm");
      const sammelCancel = document.getElementById("sammelCancel");
      const sammelClose = document.getElementById("sammelClose");
      const sammelSelectAll = document.getElementById("sammelSelectAll");
      const sammelSelectNone = document.getElementById("sammelSelectNone");

      const sammelMailDraftModal = document.getElementById("sammelMailDraftModal");
      const sammelMailClose = document.getElementById("sammelMailClose");
      const sammelMailCancel = document.getElementById("sammelMailCancel");
      const sammelMailSendAll = document.getElementById("sammelMailSendAll");
      const sammelMailStatus = document.getElementById("sammelMailStatus");
      const sammelMailMeta = document.getElementById("sammelMailMeta");
      const sammelMailList = document.getElementById("sammelMailList");
      const sammelMailTo = document.getElementById("sammelMailTo");
      const sammelMailSubject = document.getElementById("sammelMailSubject");
      const sammelMailHtml = document.getElementById("sammelMailHtml");
      const sammelMailPreview = document.getElementById("sammelMailPreview");

      let sammelMailResolver = null;
      let sammelMailDrafts = [];
      let sammelMailOrderIds = [];
      const deleteIntentHeaders = { "X-Delete-Intent": "true" };

      const confirmDoubleDelete = (
        firstMessage = "Wirklich loeschen?",
        secondMessage = "Endgueltig loeschen?",
      ) => {
        if (!window.confirm(firstMessage)) return false;
        return window.confirm(secondMessage);
      };
      let sammelMailActiveIndex = 0;
      let sammelMailHasActiveLoaded = false;

      const openSammelMailDraftModal = () => {
        if (!sammelMailDraftModal) return;
        sammelMailDraftModal.classList.add("is-open");
        sammelMailDraftModal.setAttribute("aria-hidden", "false");
      };

      const closeSammelMailDraftModal = () => {
        if (!sammelMailDraftModal) return;
        sammelMailDraftModal.classList.remove("is-open");
        sammelMailDraftModal.setAttribute("aria-hidden", "true");
        if (sammelMailStatus) sammelMailStatus.textContent = "";
        if (sammelMailList) sammelMailList.innerHTML = "";
      };

      const resolveSammelMailDrafts = (value) => {
        if (typeof sammelMailResolver === "function") sammelMailResolver(value);
        sammelMailResolver = null;
        closeSammelMailDraftModal();
      };

      const setSammelMailStatus = (txt) => {
        if (sammelMailStatus) sammelMailStatus.textContent = txt || "";
      };

      const renderSammelMailPreview = () => {
        if (!sammelMailPreview) return;
        sammelMailPreview.innerHTML = String(sammelMailHtml?.value || "");
      };

      const saveActiveSammelMailDraft = () => {
        const d = sammelMailDrafts[sammelMailActiveIndex];
        if (!d) return;
        d.to = String(sammelMailTo?.value || "").trim();
        d.subject = String(sammelMailSubject?.value || "").trim();
        d.html = String(sammelMailHtml?.value || "");
      };

      const selectSammelMailDraft = (idx) => {
        if (!Array.isArray(sammelMailDrafts) || !sammelMailDrafts.length) return;
        // avoid overwriting the very first draft with empty fields
        if (sammelMailHasActiveLoaded) {
          saveActiveSammelMailDraft();
        }
        sammelMailActiveIndex = Math.max(0, Math.min(idx, sammelMailDrafts.length - 1));
        const d = sammelMailDrafts[sammelMailActiveIndex];
        if (sammelMailTo) sammelMailTo.value = String(d?.to || "");
        if (sammelMailSubject) sammelMailSubject.value = String(d?.subject || "");
        if (sammelMailHtml) sammelMailHtml.value = String(d?.html || "");
        renderSammelMailPreview();
        sammelMailHasActiveLoaded = true;
        // highlight active supplier
        if (sammelMailList) {
          Array.from(sammelMailList.querySelectorAll("[data-idx]")).forEach((el) => {
            const isActive = Number(el.getAttribute("data-idx")) === sammelMailActiveIndex;
            el.style.background = isActive ? "#fff7f2" : "#fff";
            el.style.borderColor = isActive ? "rgba(255, 107, 53, 0.35)" : "rgba(0,0,0,0.06)";
          });
        }
      };

      const openSammelMailDraftDialog = (drafts, orderIds) =>
        new Promise((resolve) => {
          if (!sammelMailDraftModal || !sammelMailList) {
            resolve(null);
            return;
          }
          sammelMailResolver = resolve;
          sammelMailDrafts = Array.isArray(drafts) ? drafts.map((d) => ({ ...d })) : [];
          sammelMailOrderIds = Array.isArray(orderIds) ? orderIds : [];
          sammelMailActiveIndex = 0;
          sammelMailHasActiveLoaded = false;
          if (sammelMailMeta) {
            sammelMailMeta.textContent = `${sammelMailDrafts.length} Lieferanten | ${sammelMailOrderIds.length} Bestellungen`;
          }
          sammelMailList.innerHTML = "";
          sammelMailDrafts.forEach((d, idx) => {
            const row = document.createElement("div");
            row.className = "list__row list__row--clickable";
            row.setAttribute("role", "button");
            row.setAttribute("tabindex", "0");
            row.setAttribute("data-idx", String(idx));
            row.style.border = "1px solid rgba(0,0,0,0.06)";
            row.style.borderRadius = "10px";
            row.style.margin = "8px";
            row.style.padding = "10px";

            const title = document.createElement("div");
            title.className = "list__title";
            title.textContent = String(d?.lieferantName || `Lieferant #${d?.lieferantId}`);
            const meta = document.createElement("div");
            meta.className = "list__meta";
            const cnt = Array.isArray(d?.orderIds) ? d.orderIds.length : 0;
            meta.textContent = `${cnt} Bestellungen | ${Number(d?.gesamt || 0).toFixed(2)} €`;
            row.appendChild(title);
            row.appendChild(meta);
            row.addEventListener("click", () => selectSammelMailDraft(idx));
            row.addEventListener("keydown", (ev) => {
              if (ev.key === "Enter" || ev.key === " ") {
                ev.preventDefault();
                selectSammelMailDraft(idx);
              }
            });
            sammelMailList.appendChild(row);
          });
          if (sammelMailSendAll) {
            sammelMailSendAll.disabled = sammelMailDrafts.length === 0;
            sammelMailSendAll.classList.toggle("is-disabled", sammelMailDrafts.length === 0);
          }
          selectSammelMailDraft(0);
          openSammelMailDraftModal();
        });

      const mailDraftModal = document.getElementById("mailDraftModal");
      const mailDraftClose = document.getElementById("mailDraftClose");
      const mailDraftCancelBtn = document.getElementById("mailDraftCancelBtn");
      const mailDraftSendBtn = document.getElementById("mailDraftSendBtn");
      const mailDraftTo = document.getElementById("mailDraftTo");
      const mailDraftToHint = document.getElementById("mailDraftToHint");
      const mailDraftSubject = document.getElementById("mailDraftSubject");
      const mailDraftHtml = document.getElementById("mailDraftHtml");
      const mailDraftPreview = document.getElementById("mailDraftPreview");
      const mailDraftStatus = document.getElementById("mailDraftStatus");

      const openMailDraftModal = () => {
        if (!mailDraftModal) return;
        mailDraftModal.classList.add("is-open");
        mailDraftModal.setAttribute("aria-hidden", "false");
      };

      const closeMailDraftModal = () => {
        if (!mailDraftModal) return;
        mailDraftModal.classList.remove("is-open");
        mailDraftModal.setAttribute("aria-hidden", "true");
        if (mailDraftStatus) mailDraftStatus.textContent = "";
      };

      const setMailDraftStatus = (txt) => {
        if (mailDraftStatus) mailDraftStatus.textContent = txt || "";
      };

      const renderMailDraftPreview = () => {
        if (!mailDraftPreview) return;
        const html = String(mailDraftHtml?.value || "");
        mailDraftPreview.innerHTML = html;
      };

      let bestellungenData = [];
      let artikelData = [];
      let lieferantenData = [];
      let artikelMapGlobal = {};
      let lieferantMapGlobal = {};
      let currentBestellungId = null;
      let sammelCurrentResolver = null;
      let imageModal = null;
      let imageModalImage = null;
      const urlParams = new URLSearchParams(window.location.search);
      let pendingOpenBestellungId = Number(urlParams.get("open") || "");
      const openBestellungIds = new Set();

      const ensureImageModal = () => {
        if (imageModal) return;
        imageModal = document.createElement("div");
        imageModal.className = "modal";
        imageModal.setAttribute("aria-hidden", "true");
        imageModal.innerHTML = `<div class="modal__backdrop"></div><div class="modal__content" role="dialog" aria-modal="true"><div class="modal__header"><h2>Artikelfoto</h2><button class="btn btn--link" type="button" id="bestellungenImageModalClose">Schliessen</button></div><img id="bestellungenImageModalImage" alt="Artikelfoto Grossansicht" style="max-width:100%;width:100%;height:auto;border-radius:12px;" /></div>`;
        document.body.appendChild(imageModal);
        imageModalImage = imageModal.querySelector("#bestellungenImageModalImage");
        imageModal
          .querySelector("#bestellungenImageModalClose")
          .addEventListener("click", () => {
            imageModal.classList.remove("is-open");
            imageModal.setAttribute("aria-hidden", "true");
          });
        imageModal
          .querySelector(".modal__backdrop")
          .addEventListener("click", () => {
            imageModal.classList.remove("is-open");
            imageModal.setAttribute("aria-hidden", "true");
          });
      };

      const statusClass = (status) => {
        if (status === "geliefert") {
          return "pill pill--mint";
        }
        if (status === "teilgeliefert") {
          return "pill pill--amber";
        }
        if (status === "teilstorniert") {
          return "pill pill--rose";
        }
        if (status === "storniert") {
          return "pill pill--rose";
        }
        if (status === "bestellt") {
          return "pill pill--blue";
        }
        return "pill pill--amber";
      };

      const formatCurrency = (value) => {
        const amount = Number(value);
        if (!Number.isFinite(amount)) {
          return "-";
        }
        return new Intl.NumberFormat("de-DE", {
          style: "currency",
          currency: "EUR",
        }).format(amount);
      };

      const formatDate = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return "-";
        }
        return date.toLocaleDateString("de-DE");
      };

      const displayNameFromOrder = (bestellung) => {
        const explicitName = String(bestellung?.createdByName || "").trim();
        if (explicitName) return explicitName;

        const email = String(bestellung?.createdByEmail || "").trim();
        if (email && email.includes("@")) {
          const local = email.split("@")[0] || "";
          const firstToken = local
            .split(/[.\-_+]/)
            .map((s) => s.trim())
            .filter(Boolean)[0];
          if (firstToken) {
            return (
              firstToken.charAt(0).toUpperCase() +
              firstToken.slice(1).toLowerCase()
            );
          }
        }

        const uid = String(bestellung?.createdByUid || "").trim();
        return uid || "-";
      };

      const toInputDate = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return "";
        }
        return date.toISOString().slice(0, 10);
      };

      const formatArtikelOptionLabel = (item) => {
        const artikelName = String(item?.name || `#${item?.id || ""}`).trim();
        const artikelBeschreibung = String(item?.beschreibung || "").trim() || "-";
        const artikelNummer = String(item?.artikelnummer || "").trim();
        return [
          artikelName,
          artikelBeschreibung,
          artikelNummer ? `Nr: ${artikelNummer}` : "Nr: -",
        ].join(" | ");
      };

      const buildSelect = (items, placeholder, selectedId) => {
        const select = document.createElement("select");
        select.required = true;
        select.setAttribute("aria-label", placeholder);

        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = placeholder;
        select.appendChild(defaultOption);

        items.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.id;
          option.textContent = formatArtikelOptionLabel(item);
          if (selectedId && Number(selectedId) === Number(item.id)) {
            option.selected = true;
          }
          select.appendChild(option);
        });

        return select;
      };

      const artikelCache = {};
      const getArtikelByLieferantAndId = (lieferantId, artikelId) => {
        const items = artikelCache[lieferantId] || [];
        return items.find((i) => Number(i.id) === Number(artikelId));
      };
      const populateArtikelForLieferant = async (
        artikelSelect,
        lieferantId,
        selectedId,
      ) => {
        artikelSelect.innerHTML = "";
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "Artikel";
        artikelSelect.appendChild(defaultOption);
        if (!lieferantId) {
          artikelSelect.disabled = true;
          return;
        }
        artikelSelect.disabled = false;
        if (artikelCache[lieferantId]) {
          const items = artikelCache[lieferantId];
          items.forEach((item) => {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = formatArtikelOptionLabel(item);
            if (selectedId && Number(selectedId) === Number(item.id))
              option.selected = true;
            artikelSelect.appendChild(option);
          });
          return;
        }
        try {
          const res = await fetch(
            `/api/lieferanten/${encodeURIComponent(lieferantId)}/artikel`,
          );
          if (!res.ok) return;
          const items = await res.json();
          artikelCache[lieferantId] = items;
          items.forEach((item) => {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = formatArtikelOptionLabel(item);
            if (selectedId && Number(selectedId) === Number(item.id))
              option.selected = true;
            artikelSelect.appendChild(option);
          });
        } catch (e) {
          console.error("Fehler beim Laden der Artikel fuer Lieferant", e);
        }
      };

      const createPositionRow = (position = {}) => {
        const row = document.createElement("div");
        row.className = "position-row";

        const lieferantSelect = buildSelect(
          lieferantenData,
          "Lieferant",
          position.lieferantId,
        );
        const artikelSelect = buildSelect([], "Artikel", position.artikelId);
        artikelSelect.disabled = true;

        lieferantSelect.addEventListener("change", async () => {
          const lid = Number(lieferantSelect.value);
          await populateArtikelForLieferant(artikelSelect, lid);
        });
        // populate if position already has supplier
        if (position.lieferantId) {
          populateArtikelForLieferant(
            artikelSelect,
            position.lieferantId,
            position.artikelId,
          );
        }

        const mengeInput = document.createElement("input");
        mengeInput.type = "number";
        mengeInput.min = "1";
        mengeInput.step = "1";
        mengeInput.required = true;
        mengeInput.placeholder = "Menge";
        mengeInput.setAttribute("aria-label", "Menge");
        if (position.menge) {
          mengeInput.value = position.menge;
        }
        artikelSelect.addEventListener("change", () => {
          const lid = Number(lieferantSelect.value);
          const aid = Number(artikelSelect.value);
          const artikelInfo = getArtikelByLieferantAndId(lid, aid);
          if (artikelInfo?.standardBestellwert && !Number(mengeInput.value)) {
            mengeInput.value = String(artikelInfo.standardBestellwert);
          }
        });

        const geliefertInput = document.createElement("input");
        geliefertInput.type = "number";
        geliefertInput.min = "0";
        geliefertInput.step = "1";
        geliefertInput.required = false;
        geliefertInput.placeholder = "Geliefert";
        geliefertInput.setAttribute("aria-label", "Geliefert");
        geliefertInput.setAttribute("data-field", "geliefert_menge");
        if (position.geliefertMenge !== undefined) {
          geliefertInput.value = position.geliefertMenge;
        } else {
          geliefertInput.value = 0;
        }

        const storniertInput = document.createElement("input");
        storniertInput.type = "number";
        storniertInput.min = "0";
        storniertInput.step = "1";
        storniertInput.required = false;
        storniertInput.placeholder = "Storniert";
        storniertInput.setAttribute("aria-label", "Storniert");
        storniertInput.setAttribute("data-field", "storniert_menge");
        if (position.storniertMenge !== undefined) {
          storniertInput.value = position.storniertMenge;
        } else {
          storniertInput.value = 0;
        }

        const notizInput = document.createElement("input");
        notizInput.type = "text";
        notizInput.placeholder = "Notiz (optional)";
        notizInput.setAttribute("aria-label", "Notiz");
        if (position.notiz) {
          notizInput.value = position.notiz;
        }

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "btn btn--link";
        removeBtn.textContent = "Entfernen";
        // remove button should not break the 6-column grid
        removeBtn.style.gridColumn = "1 / -1";
        removeBtn.style.justifySelf = "end";
        removeBtn.addEventListener("click", () => {
          const confirmed = confirmDoubleDelete(
            "Diese Positionszeile wirklich entfernen?",
            "Positionszeile endgueltig entfernen?",
          );
          if (!confirmed) return;
          row.remove();
          if (!editPositionen.children.length) {
            editPositionen.appendChild(createPositionRow());
          }
        });

        const labeled = (labelText, el) => {
          const wrap = document.createElement("div");
          wrap.style.display = "grid";
          wrap.style.gap = "4px";
          const label = document.createElement("div");
          label.textContent = labelText;
          label.style.fontSize = "0.75rem";
          label.style.color = "var(--ink-soft)";
          label.style.fontWeight = "600";
          wrap.appendChild(label);
          wrap.appendChild(el);
          return wrap;
        };

        row.appendChild(labeled("Lieferant", lieferantSelect));
        row.appendChild(labeled("Artikel", artikelSelect));
        row.appendChild(labeled("Menge", mengeInput));
        row.appendChild(labeled("Geliefert", geliefertInput));
        row.appendChild(labeled("Storniert", storniertInput));
        row.appendChild(labeled("Notiz", notizInput));
        row.appendChild(removeBtn);
        return row;
      };

      const openModal = (bestellung) => {
        currentBestellungId = bestellung.id;
        modalTitle.textContent = `Bestellung #${bestellung.bestellnummer ?? bestellung.id} bearbeiten`;
        editStatus.value = bestellung.status || "offen";
        if (editAuftragsBestaetigt) {
          editAuftragsBestaetigt.checked = Boolean(bestellung.auftragsBestaetigt);
        }
        editDatum.value = toInputDate(bestellung.bestellDatum);
        editPositionen.innerHTML = "";

        const positionen = Array.isArray(bestellung.positionen)
          ? bestellung.positionen
          : [];

        if (!positionen.length) {
          editPositionen.appendChild(createPositionRow());
        } else {
          positionen.forEach((position) => {
            editPositionen.appendChild(createPositionRow(position));
          });
        }

        // determine editability: not editable when delivered or cancelled
        const editable = !(
          bestellung.status === "geliefert" ||
          bestellung.status === "storniert" ||
          bestellung.status === "teilstorniert"
        );
        // enable/disable add button
        editAddPosition.disabled = !editable;
        // show/hide delete button
        editDelete.style.display = editable ? "" : "none";

        // disable remove buttons and inputs when not editable
        if (!editable) {
          Array.from(
            editPositionen.querySelectorAll("select, input, button"),
          ).forEach((el) => {
            if (el.tagName.toLowerCase() === "button") {
              el.setAttribute("disabled", "true");
            } else {
              el.setAttribute("disabled", "true");
            }
          });
          editMessage.textContent =
            "Diese Bestellung ist abgeschlossen und kann nicht mehr bearbeitet werden. Status kann jedoch geaendert werden.";
        } else {
          editMessage.textContent = "";
        }

        // show send button only when status is 'offen'
        if (modalSendBtn) {
          if ((bestellung.status || "offen") === "offen") {
            modalSendBtn.style.display = "";
            modalSendBtn.disabled = false;
          } else {
            modalSendBtn.style.display = "none";
          }
        }

        // reminder is available while order is not fully completed
        if (modalReminderBtn) {
          const st = bestellung.status || "offen";
          if (st !== "geliefert" && st !== "storniert") {
            modalReminderBtn.style.display = "";
            modalReminderBtn.disabled = false;
          } else {
            modalReminderBtn.style.display = "none";
          }
        }

        bestellungModal.classList.add("is-open");
        bestellungModal.setAttribute("aria-hidden", "false");
      };

      const closeModal = () => {
        bestellungModal.classList.remove("is-open");
        bestellungModal.setAttribute("aria-hidden", "true");
        currentBestellungId = null;
      };

      const openSammelModal = () => {
        if (!sammelModal) return;
        sammelModal.classList.add("is-open");
        sammelModal.setAttribute("aria-hidden", "false");
      };

      const closeSammelModal = () => {
        if (!sammelModal) return;
        sammelModal.classList.remove("is-open");
        sammelModal.setAttribute("aria-hidden", "true");
        if (sammelGroupsList) sammelGroupsList.innerHTML = "";
        if (sammelSelectionInfo) sammelSelectionInfo.textContent = "";
      };

      const updateSammelSelectionInfo = () => {
        if (!sammelSelectionInfo || !sammelGroupsList) return;
        const all = Array.from(
          sammelGroupsList.querySelectorAll('input[type="checkbox"][data-order-id]'),
        );
        const allIds = all.map((el) => Number(el.getAttribute("data-order-id")));
        const validTotal = allIds.filter((v) => Number.isFinite(v) && v > 0).length;
        const selected = all
          .filter((el) => el.checked)
          .map((el) => Number(el.getAttribute("data-order-id")))
          .filter((v) => Number.isFinite(v) && v > 0).length;
        sammelSelectionInfo.textContent = `${selected} von ${validTotal} Bestellungen ausgewaehlt`;
        if (sammelConfirm) {
          const shouldDisable = selected === 0;
          sammelConfirm.disabled = shouldDisable;
          sammelConfirm.classList.toggle("is-disabled", shouldDisable);
          sammelConfirm.setAttribute(
            "aria-disabled",
            shouldDisable ? "true" : "false",
          );
        }
      };

      const resolveSammelSelection = (value) => {
        if (typeof sammelCurrentResolver === "function") {
          sammelCurrentResolver(value);
        }
        sammelCurrentResolver = null;
        closeSammelModal();
      };

      const openSammelSelectionDialog = (preview) =>
        new Promise((resolve) => {
          if (!sammelModal || !sammelGroupsList || !sammelConfirm) {
            resolve(null);
            return;
          }
          sammelCurrentResolver = resolve;
          sammelGroupsList.innerHTML = "";
          const groups = Array.isArray(preview?.groups) ? preview.groups : [];

          groups.forEach((g) => {
            const box = document.createElement("div");
            box.className = "list__row";
            box.style.display = "grid";
            box.style.gap = "8px";
            const header = document.createElement("div");
            header.className = "list__title";
            header.textContent = `${g.lieferantName} (${g.anzahlBestellungen} Bestellungen)`;
            box.appendChild(header);

            const orderWrap = document.createElement("div");
            orderWrap.style.display = "grid";
            orderWrap.style.gap = "6px";

            const orders =
              Array.isArray(g.orders) && g.orders.length
                ? g.orders
                : Array.isArray(g.orderIds)
                  ? g.orderIds.map((id, idx) => ({
                      orderId: Number(id),
                      bestellnummer: Array.isArray(g.bestellnummern)
                        ? String(g.bestellnummern[idx] || id)
                        : String(id),
                      anzahlPositionen: 0,
                      summe: null,
                      bestellDatum: null,
                      createdByName: null,
                    }))
                  : [];
            orders.forEach((o) => {
              const row = document.createElement("label");
              row.style.display = "grid";
              row.style.gap = "8px";
              row.style.cursor = "pointer";
              row.style.padding = "8px 10px";
              row.style.border = "1px solid rgba(0,0,0,0.08)";
              row.style.borderRadius = "10px";
              row.style.background = "#fff";
              row.style.gridTemplateColumns = "20px 1fr";
              row.style.alignItems = "start";
              const cb = document.createElement("input");
              cb.type = "checkbox";
              cb.checked = true;
              cb.setAttribute("data-order-id", String(o.orderId));
              cb.addEventListener("input", updateSammelSelectionInfo);
              cb.addEventListener("change", updateSammelSelectionInfo);
              cb.addEventListener("click", updateSammelSelectionInfo);
              cb.style.marginTop = "2px";

              const info = document.createElement("div");
              const title = document.createElement("div");
              title.className = "list__title";
              title.style.fontSize = "1rem";
              title.textContent = `#${o.bestellnummer} (${o.anzahlPositionen} Positionen)`;
              const meta = document.createElement("div");
              meta.className = "list__meta";
              const datumTxt = o.bestellDatum ? formatDate(o.bestellDatum) : "-";
              const erfasserTxt = o.createdByName ? String(o.createdByName) : "-";
              const sumTxt =
                typeof o.summe === "number" ? formatCurrency(o.summe) : "-";
              meta.textContent = `Datum: ${datumTxt} | Erfasst von: ${erfasserTxt} | Summe: ${sumTxt}`;
              info.appendChild(title);
              info.appendChild(meta);

              row.appendChild(cb);
              row.appendChild(info);
              orderWrap.appendChild(row);
            });

            box.appendChild(orderWrap);
            sammelGroupsList.appendChild(box);
          });

          updateSammelSelectionInfo();
          openSammelModal();
        });

      const renderBestellungen = (bestellungen, artikelMap, lieferantMap) => {
        bestellungenList.innerHTML = "";
        bestellungenCount.textContent = `${bestellungen.length} Bestellungen`;

        if (!bestellungen.length) {
          const emptyRow = document.createElement("div");
          emptyRow.className = "list__row";
          emptyRow.textContent = "Keine Bestellungen vorhanden.";
          bestellungenList.appendChild(emptyRow);
          return;
        }

        bestellungen.forEach((bestellung) => {
          const bestellungId = Number(bestellung.id);
          const group = document.createElement("div");
          group.className = "order-group";
          group.classList.toggle("is-open", openBestellungIds.has(bestellungId));

          const headerRow = document.createElement("div");
          headerRow.className = "list__row list__row--clickable";

          const leftDiv = document.createElement("div");
          const title = document.createElement("div");
          title.className = "list__title";
          const positionen = Array.isArray(bestellung.positionen)
            ? bestellung.positionen
            : [];
          const lieferantName = positionen.length
            ? lieferantMap[positionen[0].lieferantId] ||
              `Lieferant #${positionen[0].lieferantId}`
            : "Unbekannt";
          title.textContent = lieferantName;

          const meta = document.createElement("div");
          meta.className = "list__meta";
          const datum = formatDate(bestellung.bestellDatum);

          const artikelNamen = positionen.map((position) => {
            const artikelInfo = artikelMap[position.artikelId];
            return artikelInfo?.name || `Artikel #${position.artikelId}`;
          });
          const artikelSummary = artikelNamen.length
            ? artikelNamen.slice(0, 3).join(", ") +
              (artikelNamen.length > 3 ? ` +${artikelNamen.length - 3}` : "")
            : "-";
          const createdBy = displayNameFromOrder(bestellung);

          // Gesamtpreis aller Positionen der Bestellung berechnen
          const totalBestellung = positionen.reduce((sum, pos) => {
            const a = artikelMap[pos.artikelId];
            const preis = a?.preis ?? 0;
            const menge = Number(pos.menge) || 0;
            return sum + preis * menge;
          }, 0);

          const bestellNr = bestellung.bestellnummer ?? bestellung.id;
          meta.appendChild(
            document.createTextNode(
              `Bestellung #${bestellNr} | Datum: ${datum} | Erfasst von: ${createdBy} | `,
            ),
          );
          const abStrong = document.createElement("strong");
          abStrong.textContent = bestellung.auftragsBestaetigt
            ? "AB: JA"
            : "AB: NEIN";
          meta.appendChild(abStrong);
          meta.appendChild(
            document.createTextNode(` | Artikel: ${artikelSummary} | Gesamt: `),
          );
          const totalSpan = document.createElement("span");
          totalSpan.className = "order-total";
          totalSpan.textContent = formatCurrency(totalBestellung);
          meta.appendChild(totalSpan);

          leftDiv.appendChild(title);
          leftDiv.appendChild(meta);
          headerRow.appendChild(leftDiv);
          const statusEl = document.createElement("div");
          statusEl.className = statusClass(bestellung.status);
          statusEl.textContent = (bestellung.status || "offen").toUpperCase();
          headerRow.appendChild(statusEl);
          group.appendChild(headerRow);

          let clickTimeout = null;
          headerRow.addEventListener("click", () => {
            clickTimeout = setTimeout(() => {
              group.classList.toggle("is-open");
              if (group.classList.contains("is-open")) {
                openBestellungIds.add(bestellungId);
              } else {
                openBestellungIds.delete(bestellungId);
              }
            }, 200);
          });

          headerRow.addEventListener("dblclick", () => {
            if (clickTimeout) {
              clearTimeout(clickTimeout);
            }
            openModal(bestellung);
          });

          const itemsContainer = document.createElement("div");
          itemsContainer.className = "order-items";

          if (!positionen.length) {
            const emptyRow = document.createElement("div");
            emptyRow.className = "list__row list__row--sub";
            emptyRow.textContent = "Keine Positionen vorhanden.";
            itemsContainer.appendChild(emptyRow);
          } else {
            positionen.forEach((position) => {
              const row = document.createElement("div");
              row.className = "list__row list__row--sub";

              const posLeft = document.createElement("div");
              const posTitle = document.createElement("div");
              posTitle.className = "list__title";
              const artikelInfo = artikelMap[position.artikelId];
              const artikelName =
                artikelInfo?.name || `Artikel #${position.artikelId}`;
              if (artikelInfo?.fotoUrl) {
                const thumb = document.createElement("img");
                thumb.src = artikelInfo.fotoUrl;
                thumb.alt = artikelName;
                thumb.style.width = "36px";
                thumb.style.height = "36px";
                thumb.style.objectFit = "cover";
                thumb.style.borderRadius = "8px";
                thumb.style.marginRight = "8px";
                thumb.style.verticalAlign = "middle";
                thumb.style.cursor = "zoom-in";
                thumb.addEventListener("click", (e) => {
                  e.stopPropagation();
                  ensureImageModal();
                  imageModalImage.src = artikelInfo.fotoUrl;
                  imageModal.classList.add("is-open");
                  imageModal.setAttribute("aria-hidden", "false");
                });
                posTitle.appendChild(thumb);
              }
              posTitle.appendChild(document.createTextNode(artikelName));

              const posMeta = document.createElement("div");
              posMeta.className = "list__meta";
              const preis = artikelInfo?.preis ?? 0;
              const menge = Number(position.menge) || 0;
              const geliefertMenge = Number(position.geliefertMenge) || 0;
              const storniertMenge = Number(position.storniertMenge) || 0;
              const gesamtPos = preis * menge;
              const notiz = String(position.notiz || "").trim();
              const notizPart = notiz
                ? ` | <strong>Notiz:</strong> <strong>${notiz}</strong>`
                : "";
              const remaining = menge - geliefertMenge - storniertMenge;
              const deliveryPart =
                geliefertMenge || storniertMenge
                  ? ` | Geliefert: ${geliefertMenge} | Storniert: ${storniertMenge}${
                      remaining > 0 ? ` | Rest: ${remaining}` : ""
                    }`
                  : "";
              const artikelNummer = String(
                artikelInfo?.artikelnummer || position.artikelId,
              ).trim();
              posMeta.innerHTML = `Artikelnummer: ${artikelNummer} | Preis: ${formatCurrency(preis)} | Menge: ${menge}${notizPart}${deliveryPart} | Gesamt: <span class="position-total">${formatCurrency(gesamtPos)}</span>`;

              posLeft.appendChild(posTitle);
              posLeft.appendChild(posMeta);
              row.appendChild(posLeft);
              itemsContainer.appendChild(row);
            });
          }

          group.appendChild(itemsContainer);

          // no per-row action buttons here (send moved to modal)

          bestellungenList.appendChild(group);

          if (
            Number.isFinite(pendingOpenBestellungId) &&
            pendingOpenBestellungId > 0 &&
            bestellungId === pendingOpenBestellungId
          ) {
            group.classList.add("is-open");
            openBestellungIds.add(bestellungId);
            openModal(bestellung);
            pendingOpenBestellungId = NaN;
            const cleanUrl = `${window.location.pathname}${window.location.hash || ""}`;
            window.history.replaceState({}, "", cleanUrl);
          }
        });
      };

      const primaryLieferantName = (bestellung, lieferantMap) => {
        const positionen = Array.isArray(bestellung?.positionen)
          ? bestellung.positionen
          : [];
        if (!positionen.length) return "";
        const lid = positionen[0].lieferantId;
        return String(lieferantMap[lid] || "").trim();
      };

      const applyBestellungenFilterAndSort = () => {
        const artikelMap = artikelMapGlobal;
        const lieferantMap = lieferantMapGlobal;
        const termRaw = String(bestellungenSearch?.value || "").toLowerCase().trim();
        const tokens = termRaw ? termRaw.split(/\s+/).filter(Boolean) : [];
        const erfasserFilter = (bestellungenErfasserFilter?.value || "").trim();
        const statusFilter = bestellungenStatusFilter?.value || "";
        const sort = bestellungenSort?.value || "date-desc";

        // defensiv: je nach JSON-Form (Array vs. Objekt { value }) normalisieren
        let list = Array.isArray(bestellungenData) ? [...bestellungenData] : [];

        if (statusFilter) {
          list = list.filter((b) => (b.status || "offen") === statusFilter);
        }
        if (erfasserFilter) {
          list = list.filter(
            (b) => displayNameFromOrder(b).toLowerCase() === erfasserFilter.toLowerCase(),
          );
        }

        if (tokens.length) {
          list = list.filter((b) => {
            // JS: `??` nicht ohne Klammern mit `||` mischen; daher nur `??`
            const nr = String(b.bestellnummer ?? b.id ?? "").toLowerCase();
            const status = String(b.status || "").toLowerCase();
            const datum = String(b.bestellDatum || "").toLowerCase();
            const positionen = Array.isArray(b.positionen) ? b.positionen : [];
            const artikelNamen = positionen
              .map((p) => artikelMap[p.artikelId]?.name || "")
              .join(" ")
              .toLowerCase();
            const artikelNummern = positionen
              .map((p) => artikelMap[p.artikelId]?.artikelnummer || "")
              .join(" ")
              .toLowerCase();
            const lieferantenNamen = positionen
              .map((p) => lieferantMap[p.lieferantId] || "")
              .join(" ")
              .toLowerCase();
            const mengen = positionen
              .map((p) => String(p.menge ?? ""))
              .join(" ")
              .toLowerCase();
            const notizen = positionen
              .map((p) => p.notiz || "")
              .join(" ")
              .toLowerCase();
            const createdBy = displayNameFromOrder(b).toLowerCase();
            const flags = [
              b.auftragsBestaetigt ? "auftragsbestaetigt" : "",
              b.auftragsBestaetigt ? "ja" : "",
            ]
              .filter(Boolean)
              .join(" ");
            const haystack =
              nr +
              " " +
              status +
              " " +
              datum +
              " " +
              artikelNamen +
              " " +
              artikelNummern +
              " " +
              lieferantenNamen +
              " " +
              mengen +
              " " +
              notizen +
              " " +
              createdBy +
              " " +
              flags;
            return tokens.every((t) => haystack.includes(t));
          });
        }

        list.sort((a, b) => {
          const dateA = new Date(a.bestellDatum || 0).getTime();
          const dateB = new Date(b.bestellDatum || 0).getTime();
          const nameA = primaryLieferantName(a, lieferantMap);
          const nameB = primaryLieferantName(b, lieferantMap);
          switch (sort) {
            case "date-asc":
              return dateA - dateB;
            case "lieferant-asc":
              return nameA.localeCompare(nameB, "de", {
                sensitivity: "base",
              });
            case "lieferant-desc":
              return nameB.localeCompare(nameA, "de", {
                sensitivity: "base",
              });
            default:
              return dateB - dateA;
          }
        });

        renderBestellungen(list, artikelMap, lieferantMap);
      };

      const loadBestellungen = async () => {
        try {
          const [bestellungenRes, artikelRes, lieferantenRes] =
            await Promise.all([
              fetch("/api/bestellungen"),
              fetch("/api/artikel"),
              fetch("/api/lieferanten"),
            ]);

          const rawBestellungen = await bestellungenRes.json();
          bestellungenData = Array.isArray(rawBestellungen)
            ? rawBestellungen
            : (rawBestellungen?.value && Array.isArray(rawBestellungen.value)
                ? rawBestellungen.value
                : []);
          const artikelResponse = await artikelRes.json();
          const lieferantenResponse = await lieferantenRes.json();

          artikelData = Array.isArray(artikelResponse)
            ? artikelResponse
            : artikelResponse.value || [];
          lieferantenData = Array.isArray(lieferantenResponse)
            ? lieferantenResponse
            : lieferantenResponse.value || [];

          artikelMapGlobal = artikelData.reduce((acc, item) => {
            acc[item.id] = {
              name: item.name,
              artikelnummer: item.artikelnummer,
              preis: item.preis,
              standardBestellwert: item.standardBestellwert,
              fotoUrl: item.fotoUrl,
            };
            return acc;
          }, {});

          lieferantMapGlobal = lieferantenData.reduce((acc, item) => {
            acc[item.id] = item.name;
            return acc;
          }, {});

          if (bestellungenErfasserFilter) {
            const previous = bestellungenErfasserFilter.value || "";
            const uniqueErfasser = Array.from(
              new Set(
                bestellungenData
                  .map((b) => displayNameFromOrder(b))
                  .filter((v) => String(v || "").trim() && v !== "-"),
              ),
            ).sort((a, b) => a.localeCompare(b, "de"));
            bestellungenErfasserFilter.innerHTML =
              '<option value="">Erfasser: alle</option>';
            uniqueErfasser.forEach((name) => {
              const option = document.createElement("option");
              option.value = name;
              option.textContent = `Erfasser: ${name}`;
              if (previous && previous === name) option.selected = true;
              bestellungenErfasserFilter.appendChild(option);
            });
          }

          applyBestellungenFilterAndSort();
        } catch (error) {
          console.error("Fehler beim Laden der Bestellungen:", error);
          bestellungenCount.textContent = "Fehler beim Laden";
        }
      };

      const runSammelbestellung = async () => {
        if (!bestellungenBulkSend) return;
        try {
          bestellungenBulkSend.disabled = true;
          bestellungenBulkSend.textContent = "Pruefe offene Bestellungen...";
          const previewRes = await fetch("/api/bestellungen/sammel/preview");
          if (!previewRes.ok) {
            const txt = await previewRes.text();
            alert(`Sammelvorschau fehlgeschlagen: ${txt}`);
            return;
          }
          const preview = await previewRes.json();
          const groups = Array.isArray(preview.groups) ? preview.groups : [];
          if (!groups.length) {
            alert("Keine offenen Bestellungen fuer Sammelbestellung vorhanden.");
            return;
          }
          const lines = groups
            .slice(0, 10)
            .map(
              (g) =>
                `- ${g.lieferantName}: ${g.anzahlBestellungen} Bestellungen, ${g.anzahlPositionen} Positionen`,
            )
            .join("\n");
          const more = groups.length > 10 ? `\n... +${groups.length - 10} weitere` : "";
          const preOk = window.confirm(
            `Sammelbestellung vorbereiten?\n\nLieferanten: ${preview.totalGroups}\nBestellungen: ${preview.totalOrders}\n\n${lines}${more}\n\nDanach kannst du einzelne Bestellungen auswaehlen.`,
          );
          if (!preOk) return;

          const selectedOrderIds = await openSammelSelectionDialog(preview);
          if (!Array.isArray(selectedOrderIds)) return;
          if (!selectedOrderIds.length) {
            alert("Bitte mindestens eine Bestellung auswaehlen.");
            return;
          }

          bestellungenBulkSend.textContent = "Entwuerfe werden erstellt...";
          const draftRes = await fetch("/api/bestellungen/sammel/send/preview", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ orderIds: selectedOrderIds }),
          });
          const draftJson = await draftRes.json().catch(() => null);
          if (!draftRes.ok) {
            const detail = draftJson?.detail ? `\n${draftJson.detail}` : "";
            alert(
              `Entwurf fehlgeschlagen: ${draftJson?.error || draftRes.status}${detail}`,
            );
            return;
          }
          const drafts = Array.isArray(draftJson?.drafts) ? draftJson.drafts : [];
          if (!drafts.length) {
            alert("Keine Entwürfe vorhanden.");
            return;
          }

          const edited = await openSammelMailDraftDialog(drafts, selectedOrderIds);
          if (!Array.isArray(edited)) return;
          if (!edited.length) {
            alert("Keine Entwürfe ausgewählt.");
            return;
          }

          bestellungenBulkSend.textContent = "Sammelbestellung wird gesendet...";
          const sendRes = await fetch("/api/bestellungen/sammel/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              orderIds: selectedOrderIds,
              overrides: edited.map((d) => ({
                lieferantId: d.lieferantId,
                to: d.to,
                subject: d.subject,
                html: d.html,
              })),
            }),
          });
          const sendJson = await sendRes.json().catch(() => null);
          if (!sendRes.ok) {
            const detail = sendJson?.detail ? `\n${sendJson.detail}` : "";
            alert(
              `Sammelbestellung fehlgeschlagen: ${sendJson?.error || sendRes.status}${detail}`,
            );
            return;
          }

          alert(
            `Sammelbestellung erfolgreich.\nVersendete Lieferanten: ${sendJson?.sentGroups || 0}\nAktualisierte Bestellungen: ${sendJson?.updatedOrders || 0}`,
          );
          await loadBestellungen();
        } catch (e) {
          console.error(e);
          alert("Sammelbestellung konnte nicht ausgefuehrt werden.");
        } finally {
          if (bestellungenBulkSend) {
            bestellungenBulkSend.disabled = false;
            bestellungenBulkSend.textContent =
              "Offene Sammelbestellung ausfuehren";
          }
        }
      };

      const initRoleBasedActions = async () => {
        if (!bestellungenBulkSend) return;
        try {
          const res = await fetch("/api/auth/me");
          if (!res.ok) return;
          const me = await res.json();
          const role = String(me?.role || "");
          if (role === "produktion") {
            bestellungenBulkSend.style.display = "none";
          }
        } catch {
          // ignore
        }
      };

      editAddPosition.addEventListener("click", () => {
        editPositionen.appendChild(createPositionRow());
      });

      editCancel.addEventListener("click", closeModal);
      modalClose.addEventListener("click", closeModal);
      bestellungModal
        .querySelector(".modal__backdrop")
        .addEventListener("click", closeModal);

      const collectEditPositionen = () =>
        Array.from(editPositionen.children).map((row) => {
          const selects = row.querySelectorAll("select");
          const mengeInput = row.querySelector('input[aria-label="Menge"]');
          const geliefertInput = row.querySelector(
            'input[data-field="geliefert_menge"]',
          );
          const storniertInput = row.querySelector(
            'input[data-field="storniert_menge"]',
          );
          const notizInput = row.querySelector('input[type="text"]');
          return {
            lieferantId: Number(selects[0].value),
            artikelId: Number(selects[1].value),
            menge: Number(mengeInput?.value || 0),
            geliefertMenge: Number(geliefertInput?.value || 0),
            storniertMenge: Number(storniertInput?.value || 0),
            notiz: String(notizInput?.value || "").trim(),
          };
        });
      const persistCurrentBestellungFromForm = async () => {
        const positionen = collectEditPositionen();
        if (
          !positionen.length ||
          positionen.some(
            (pos) => !pos.lieferantId || !pos.artikelId || !pos.menge,
          )
        ) {
          throw new Error("Bitte alle Positionen ausfuellen.");
        }
        const payload = {
          status: editStatus.value,
          bestellDatum: editDatum.value,
          auftragsBestaetigt: editAuftragsBestaetigt?.checked || false,
          positionen,
        };
        const response = await fetch(`/api/bestellungen/${currentBestellungId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          throw new Error(await response.text());
        }
      };

      editForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        editMessage.textContent = "";

        const positionen = collectEditPositionen();
        // if positions are not editable, only change status via status endpoint
        if (editAddPosition.disabled) {
          try {
            const res = await fetch(
              `/api/bestellungen/${currentBestellungId}/status`,
              {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  status: editStatus.value,
                  auftragsBestaetigt:
                    editAuftragsBestaetigt?.checked || false,
                }),
              },
            );
            if (!res.ok) {
              const txt = await res.text();
              editMessage.textContent = `Fehler: ${txt}`;
              return;
            }
            closeModal();
            loadBestellungen();
          } catch (e) {
            console.error(e);
            editMessage.textContent = "Speichern fehlgeschlagen.";
          }
          return;
        }

        if (
          !positionen.length ||
          positionen.some(
            (pos) => !pos.lieferantId || !pos.artikelId || !pos.menge,
          )
        ) {
          editMessage.textContent = "Bitte alle Positionen ausfuellen.";
          return;
        }

        try {
          await persistCurrentBestellungFromForm();
          closeModal();
          loadBestellungen();
        } catch (error) {
          console.error("Fehler beim Speichern:", error);
          editMessage.textContent = "Speichern fehlgeschlagen.";
        }
      });

      editDelete.addEventListener("click", async () => {
        if (!currentBestellungId) {
          return;
        }

        const confirmed = confirmDoubleDelete(
          "Soll diese Bestellung wirklich geloescht werden?",
          "Bestellung endgueltig loeschen?",
        );
        if (!confirmed) {
          return;
        }

        try {
          const response = await fetch(
            `/api/bestellungen/${currentBestellungId}`,
            { method: "DELETE", headers: deleteIntentHeaders },
          );

          if (!response.ok) {
            const errorText = await response.text();
            editMessage.textContent = `Fehler: ${errorText}`;
            return;
          }

          closeModal();
          loadBestellungen();
        } catch (error) {
          console.error("Fehler beim Loeschen:", error);
          editMessage.textContent = "Loeschen fehlgeschlagen.";
        }
      });

      if (modalSendBtn) {
        modalSendBtn.addEventListener("click", async (e) => {
          e.preventDefault();
          if (!currentBestellungId) return;
          try {
            if (!editAddPosition.disabled) {
              try {
                await persistCurrentBestellungFromForm();
                await loadBestellungen();
              } catch (saveErr) {
                const saveMsg =
                  saveErr instanceof Error ? saveErr.message : String(saveErr || "");
                editMessage.textContent = `Bitte zuerst korrigieren: ${saveMsg}`;
                return;
              }
            }
            setMailDraftStatus("Lade Entwurf...");
            if (mailDraftTo) mailDraftTo.value = "";
            if (mailDraftSubject) mailDraftSubject.value = "";
            if (mailDraftHtml) mailDraftHtml.value = "";
            if (mailDraftToHint) mailDraftToHint.textContent = "";

            const previewRes = await fetch(
              `/api/bestellungen/${currentBestellungId}/send/preview`,
            );
            if (!previewRes.ok) {
              const txt = await previewRes.text();
              alert("Vorschau fehlgeschlagen: " + txt);
              return;
            }
            const preview = await previewRes.json().catch(() => null);
            if (mailDraftTo) mailDraftTo.value = String(preview?.to || "");
            if (mailDraftSubject)
              mailDraftSubject.value = String(preview?.subject || "");
            if (mailDraftHtml) mailDraftHtml.value = String(preview?.html || "");
            renderMailDraftPreview();
            if (mailDraftToHint) {
              const supplier = String(preview?.lieferantName || "").trim();
              const supplierEmail = String(preview?.lieferantEmail || "").trim();
              const fallback = String(preview?.fallbackTo || "").trim();
              mailDraftToHint.textContent = supplierEmail
                ? `Lieferant: ${supplier}${supplier ? " " : ""}<${supplierEmail}>`
                : fallback
                  ? `Hinweis: Lieferant hat keine E-Mail. Fallback: ${fallback}`
                  : "";
            }

            mailDraftModal?.setAttribute("data-send-endpoint", "order");
            openMailDraftModal();
          } catch (err) {
            console.error(err);
            alert("Vorschau fehlgeschlagen");
          }
        });
      }

      if (mailDraftHtml) {
        mailDraftHtml.addEventListener("input", () => {
          renderMailDraftPreview();
        });
      }
      if (mailDraftClose) mailDraftClose.addEventListener("click", closeMailDraftModal);
      if (mailDraftCancelBtn)
        mailDraftCancelBtn.addEventListener("click", closeMailDraftModal);
      if (mailDraftModal) {
        const backdrop = mailDraftModal.querySelector(".modal__backdrop");
        if (backdrop) backdrop.addEventListener("click", closeMailDraftModal);
      }
      if (mailDraftSendBtn) {
        mailDraftSendBtn.addEventListener("click", async () => {
          if (!currentBestellungId) return;
          try {
            mailDraftSendBtn.disabled = true;
            setMailDraftStatus("Sende...");
            const payload = {
              to: String(mailDraftTo?.value || "").trim(),
              subject: String(mailDraftSubject?.value || "").trim(),
              html: String(mailDraftHtml?.value || ""),
            };
            const mode = String(
              mailDraftModal?.getAttribute("data-send-endpoint") || "order",
            );
            const endpoint =
              mode === "reminder"
                ? `/api/bestellungen/${currentBestellungId}/reminder/send`
                : `/api/bestellungen/${currentBestellungId}/send`;

            const res = await fetch(endpoint, {
              method: mode === "reminder" ? "POST" : "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const txt = await res.text();
              alert("Senden fehlgeschlagen: " + txt);
              setMailDraftStatus("Senden fehlgeschlagen");
              mailDraftSendBtn.disabled = false;
              return;
            }
            closeMailDraftModal();
            closeModal();
            await loadBestellungen();
          } catch (e) {
            console.error(e);
            alert("Senden fehlgeschlagen");
          } finally {
            if (mailDraftSendBtn) mailDraftSendBtn.disabled = false;
            setMailDraftStatus("");
          }
        });
      }

      if (modalReminderBtn) {
        modalReminderBtn.addEventListener("click", async (e) => {
          e.preventDefault();
          if (!currentBestellungId) return;
          try {
            if (!editAddPosition.disabled) {
              try {
                await persistCurrentBestellungFromForm();
                await loadBestellungen();
              } catch (saveErr) {
                const saveMsg =
                  saveErr instanceof Error ? saveErr.message : String(saveErr || "");
                editMessage.textContent = `Bitte zuerst korrigieren: ${saveMsg}`;
                return;
              }
            }
            setMailDraftStatus("Lade Reminder-Entwurf...");
            if (mailDraftTo) mailDraftTo.value = "";
            if (mailDraftSubject) mailDraftSubject.value = "";
            if (mailDraftHtml) mailDraftHtml.value = "";
            if (mailDraftToHint) mailDraftToHint.textContent = "";

            const previewRes = await fetch(
              `/api/bestellungen/${currentBestellungId}/reminder/send/preview`,
            );
            if (!previewRes.ok) {
              const txt = await previewRes.text();
              alert("Vorschau fehlgeschlagen: " + txt);
              return;
            }
            const preview = await previewRes.json().catch(() => null);
            if (mailDraftTo) mailDraftTo.value = String(preview?.to || "");
            if (mailDraftSubject)
              mailDraftSubject.value = String(preview?.subject || "");
            if (mailDraftHtml) mailDraftHtml.value = String(preview?.html || "");
            renderMailDraftPreview();
            if (mailDraftToHint) {
              const supplier = String(preview?.lieferantName || "").trim();
              const supplierEmail = String(preview?.lieferantEmail || "").trim();
              const fallback = String(preview?.fallbackTo || "").trim();
              mailDraftToHint.textContent = supplierEmail
                ? `Lieferant: ${supplier}${supplier ? " " : ""}<${supplierEmail}>`
                : fallback
                  ? `Hinweis: Lieferant hat keine E-Mail. Fallback: ${fallback}`
                  : "";
            }

            // Remember that current draft send should go to reminder endpoint
            mailDraftModal?.setAttribute("data-send-endpoint", "reminder");
            openMailDraftModal();
          } catch (err) {
            console.error(err);
            alert("Vorschau fehlgeschlagen");
          }
        });
      }

      bestellungenRefresh.addEventListener("click", () => {
        if (bestellungenSearch) bestellungenSearch.value = "";
        if (bestellungenErfasserFilter) bestellungenErfasserFilter.value = "";
        if (bestellungenStatusFilter) bestellungenStatusFilter.value = "";
        if (bestellungenSort) bestellungenSort.value = "date-desc";
        loadBestellungen();
      });
      if (bestellungenSearch) {
        bestellungenSearch.addEventListener("input", applyBestellungenFilterAndSort);
      }
      if (bestellungenErfasserFilter) {
        bestellungenErfasserFilter.addEventListener(
          "change",
          applyBestellungenFilterAndSort,
        );
      }
      if (bestellungenStatusFilter) {
        bestellungenStatusFilter.addEventListener(
          "change",
          applyBestellungenFilterAndSort,
        );
      }
      if (bestellungenSort) {
        bestellungenSort.addEventListener("change", applyBestellungenFilterAndSort);
      }
      if (bestellungenBulkSend) {
        bestellungenBulkSend.addEventListener("click", runSammelbestellung);
      }
      if (sammelCancel) {
        sammelCancel.addEventListener("click", () => resolveSammelSelection(null));
      }
      if (sammelClose) {
        sammelClose.addEventListener("click", () => resolveSammelSelection(null));
      }
      if (sammelModal) {
        const backdrop = sammelModal.querySelector(".modal__backdrop");
        if (backdrop) {
          backdrop.addEventListener("click", () => resolveSammelSelection(null));
        }
      }
      if (sammelSelectAll) {
        sammelSelectAll.addEventListener("click", () => {
          if (!sammelGroupsList) return;
          sammelGroupsList
            .querySelectorAll('input[type="checkbox"][data-order-id]')
            .forEach((el) => {
              el.checked = true;
            });
          updateSammelSelectionInfo();
        });
      }
      if (sammelSelectNone) {
        sammelSelectNone.addEventListener("click", () => {
          if (!sammelGroupsList) return;
          sammelGroupsList
            .querySelectorAll('input[type="checkbox"][data-order-id]')
            .forEach((el) => {
              el.checked = false;
            });
          updateSammelSelectionInfo();
        });
      }
      if (sammelConfirm) {
        sammelConfirm.addEventListener("click", () => {
          if (!sammelGroupsList) {
            resolveSammelSelection(null);
            return;
          }
          const selected = Array.from(
            sammelGroupsList.querySelectorAll(
              'input[type="checkbox"][data-order-id]',
            ),
          )
            .filter((el) => el.checked)
            .map((el) => Number(el.getAttribute("data-order-id")))
            .filter((v) => Number.isFinite(v) && v > 0);
          resolveSammelSelection(selected);
        });
      }

      if (sammelMailHtml) {
        sammelMailHtml.addEventListener("input", () => {
          renderSammelMailPreview();
        });
      }
      if (sammelMailClose)
        sammelMailClose.addEventListener("click", () => resolveSammelMailDrafts(null));
      if (sammelMailCancel)
        sammelMailCancel.addEventListener("click", () => resolveSammelMailDrafts(null));
      if (sammelMailDraftModal) {
        const backdrop = sammelMailDraftModal.querySelector(".modal__backdrop");
        if (backdrop) backdrop.addEventListener("click", () => resolveSammelMailDrafts(null));
      }
      if (sammelMailSendAll) {
        sammelMailSendAll.addEventListener("click", () => {
          saveActiveSammelMailDraft();
          resolveSammelMailDrafts(sammelMailDrafts);
        });
      }

      initRoleBasedActions();
      loadBestellungen();
    </script>
    <script type="module" src="/push-notifications.js"></script>
    <script src="/auth-guard.js"></script>
    <script src="/profile-widget.js"></script>
    <script src="/mobile-nav.js"></script>
  </body>
</html>
