<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lieferantendetail</title>
    <link rel="stylesheet" href="/static/styles/uebersicht.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1 id="lieferantName">Lieferant</h1>
        <p id="lieferantMeta" class="hero__subtitle"></p>
      </header>

      <section class="split">
        <div class="panel">
          <div class="panel__header">
            <h2>Kontakt</h2>
          </div>
          <div class="list" id="kontaktList"></div>
          <div class="panel__header" style="margin-top: 20px">
            <h2>Nachricht senden</h2>
          </div>
          <form id="emailForm" class="form">
            <div class="form__row">
              <label for="emailSubject">Betreff</label>
              <input id="emailSubject" name="subject" type="text" />
            </div>
            <div class="form__row">
              <label for="emailText">Nachricht</label>
              <textarea id="emailText" name="text" rows="5"></textarea>
            </div>
            <div class="form__actions">
              <a class="btn btn--primary" id="mailtoLink" href="#"
                >E-Mail oeffnen</a
              >
              <a class="btn btn--ghost" href="/lieferanten">Zurueck</a>
            </div>
            <div id="emailMessage" class="form__message" role="status"></div>
          </form>
        </div>

        <div class="panel">
          <div class="panel__header">
            <h2>Artikel vom Lieferanten</h2>
          </div>
          <div class="list" id="artikelList"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>Bestellverlauf</h2>
        </div>
        <div class="list" id="bestellverlaufList"></div>
      </section>
    </div>

    <nav class="navbar">
      <a class="navbar__item" href="/uebersicht">Dashboard</a>
      <a class="navbar__item" href="/bestellungen">Bestellungen</a>
      <a class="navbar__item is-active" href="/lieferanten">Lieferanten</a>
      <a class="navbar__item" href="/artikel">Artikel</a>
      <a class="navbar__item" href="/einstellungen">Einstellungen</a>
    </nav>

    <script>
      const lieferantName = document.getElementById("lieferantName");
      const lieferantMeta = document.getElementById("lieferantMeta");
      const kontaktList = document.getElementById("kontaktList");
      const artikelList = document.getElementById("artikelList");
      const bestellverlaufList = document.getElementById("bestellverlaufList");
      const emailForm = document.getElementById("emailForm");
      const emailMessage = document.getElementById("emailMessage");
      const mailtoLink = document.getElementById("mailtoLink");
      let imageModal = null;
      let imageModalImage = null;

      const lieferantId = Number(window.location.pathname.split("/").pop());

      const formatValue = (label, value) => {
        const row = document.createElement("div");
        row.className = "list__row";
        const title = document.createElement("div");
        title.className = "list__title";
        title.textContent = label;
        const meta = document.createElement("div");
        meta.className = "list__meta";
        meta.textContent = value || "Nicht hinterlegt";
        row.appendChild(title);
        row.appendChild(meta);
        return row;
      };

      const renderArtikel = (artikel) => {
        artikelList.innerHTML = "";
        if (!artikel.length) {
          const row = document.createElement("div");
          row.className = "list__row";
          row.textContent = "Keine Artikel fuer diesen Lieferanten gefunden.";
          artikelList.appendChild(row);
          return;
        }

        artikel.forEach((item) => {
          const row = document.createElement("a");
          row.className = "list__row";
          row.href = `/artikel?open=${encodeURIComponent(item.id)}`;
          const left = document.createElement("div");
          left.style.display = "flex";
          left.style.alignItems = "center";
          left.style.gap = "10px";
          if (item.fotoUrl) {
            const thumb = document.createElement("img");
            thumb.src = item.fotoUrl;
            thumb.alt = item.name || "Artikelfoto";
            thumb.style.width = "44px";
            thumb.style.height = "44px";
            thumb.style.objectFit = "cover";
            thumb.style.borderRadius = "8px";
            thumb.style.cursor = "zoom-in";
            thumb.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              imageModalImage.src = item.fotoUrl;
              imageModal.classList.add("is-open");
              imageModal.setAttribute("aria-hidden", "false");
            });
            left.appendChild(thumb);
          }
          const textWrap = document.createElement("div");
          const title = document.createElement("div");
          title.className = "list__title";
          title.textContent = item.name;
          const meta = document.createElement("div");
          meta.className = "list__meta";
          const nummer = item.artikelnummer ? `#${item.artikelnummer} | ` : "";
          const ve = item.verpackungseinheit ? ` | VE: ${item.verpackungseinheit}` : "";
          const std = item.standardBestellwert
            ? ` | Std: ${item.standardBestellwert}`
            : "";
          meta.textContent = `${nummer}Preis: ${new Intl.NumberFormat("de-DE", {
            style: "currency",
            currency: "EUR",
          }).format(Number(item.preis || 0))}${ve}${std}`;
          textWrap.appendChild(title);
          textWrap.appendChild(meta);
          left.appendChild(textWrap);
          row.appendChild(left);
          artikelList.appendChild(row);
        });
      };

      const statusClass = (status) => {
        if (status === "geliefert") return "pill pill--mint";
        if (status === "storniert") return "pill pill--rose";
        if (status === "bestellt") return "pill pill--blue";
        return "pill pill--amber";
      };

      const renderBestellverlauf = (bestellungen) => {
        bestellverlaufList.innerHTML = "";
        if (!Array.isArray(bestellungen) || !bestellungen.length) {
          const row = document.createElement("div");
          row.className = "list__row";
          row.textContent = "Noch keine Bestellungen für diesen Lieferanten.";
          bestellverlaufList.appendChild(row);
          return;
        }

        bestellungen.forEach((b) => {
          const row = document.createElement("a");
          row.className = "list__row";
          row.href = `/bestellungen?open=${encodeURIComponent(b.id)}`;

          const left = document.createElement("div");
          const title = document.createElement("div");
          title.className = "list__title";
          title.textContent = `Bestellung #${b.bestellnummer ?? b.id}`;
          const meta = document.createElement("div");
          meta.className = "list__meta";
          const author = b.createdByName || b.createdByEmail || "-";
          const dateText = b.bestellDatum
            ? new Date(b.bestellDatum).toLocaleDateString("de-DE")
            : "-";
          meta.textContent = `Erfasst von: ${author} | ${dateText} | Positionen: ${Number(b.positionenAnzahl || 0)}`;
          left.appendChild(title);
          left.appendChild(meta);

          const right = document.createElement("span");
          right.className = statusClass(String(b.status || "offen"));
          right.textContent = String(b.status || "offen").toUpperCase();

          row.appendChild(left);
          row.appendChild(right);
          bestellverlaufList.appendChild(row);
        });
      };

      const loadLieferant = async () => {
        const [lieferantRes, artikelRes, bestellungenRes] = await Promise.all([
          fetch(`/api/lieferanten/${lieferantId}`),
          fetch(`/api/lieferanten/${lieferantId}/artikel`),
          fetch(`/api/lieferanten/${lieferantId}/bestellungen`),
        ]);

        if (!lieferantRes.ok) {
          lieferantName.textContent = "Lieferant nicht gefunden";
          lieferantMeta.textContent = "";
          return;
        }

        const lieferant = await lieferantRes.json();
        const artikel = await artikelRes.json();
        const bestellungen = await bestellungenRes.json();

        lieferantName.textContent = lieferant.name;
        lieferantMeta.textContent = "";
        kontaktList.innerHTML = "";
        kontaktList.appendChild(
          formatValue("Kontaktperson", lieferant.kontaktPerson),
        );
        kontaktList.appendChild(formatValue("E-Mail", lieferant.email));
        kontaktList.appendChild(formatValue("Telefon", lieferant.telefon));
        
        // Anschrift zusammenstellen
        const adresspteile = [];
        if (lieferant.strasse) adresspteile.push(lieferant.strasse);
        if (lieferant.plz || lieferant.stadt) {
          const plzStadt = [lieferant.plz, lieferant.stadt].filter(Boolean).join(" ");
          if (plzStadt) adresspteile.push(plzStadt);
        }
        if (lieferant.land) adresspteile.push(lieferant.land);
        const anschrift = adresspteile.join(", ");
        
        kontaktList.appendChild(formatValue("Anschrift", anschrift));
        renderArtikel(artikel);
        renderBestellverlauf(bestellungen);

        if (lieferant.email) {
          mailtoLink.dataset.email = lieferant.email;
          mailtoLink.textContent = "E-Mail oeffnen";
          mailtoLink.classList.remove("is-disabled");
        } else {
          mailtoLink.dataset.email = "";
          mailtoLink.textContent = "Keine E-Mail hinterlegt";
          mailtoLink.classList.add("is-disabled");
        }
      };

      emailForm.addEventListener("submit", (event) => {
        event.preventDefault();
        emailMessage.textContent = "";
      });

      mailtoLink.addEventListener("click", (event) => {
        const email = mailtoLink.dataset.email;
        if (!email) {
          event.preventDefault();
          emailMessage.textContent = "Keine E-Mail-Adresse hinterlegt.";
          return;
        }

        const subject = document.getElementById("emailSubject").value || "";
        const text = document.getElementById("emailText").value || "";
        const params = new URLSearchParams();
        if (subject) {
          params.set("subject", subject);
        }
        if (text) {
          params.set("body", text);
        }

        const query = params.toString();
        mailtoLink.href = query
          ? `mailto:${email}?${query}`
          : `mailto:${email}`;
      });

      if (Number.isFinite(lieferantId)) {
        imageModal = document.createElement("div");
        imageModal.className = "modal";
        imageModal.setAttribute("aria-hidden", "true");
        imageModal.innerHTML = `<div class="modal__backdrop"></div><div class="modal__content" role="dialog" aria-modal="true"><div class="modal__header"><h2>Artikelfoto</h2><button class="btn btn--link" type="button" id="imageModalClose">Schliessen</button></div><img id="imageModalImage" alt="Artikelfoto Grossansicht" style="max-width:100%;width:100%;height:auto;border-radius:12px;" /></div>`;
        document.body.appendChild(imageModal);
        imageModalImage = imageModal.querySelector("#imageModalImage");
        imageModal.querySelector("#imageModalClose").addEventListener("click", () => {
          imageModal.classList.remove("is-open");
          imageModal.setAttribute("aria-hidden", "true");
        });
        imageModal.querySelector(".modal__backdrop").addEventListener("click", () => {
          imageModal.classList.remove("is-open");
          imageModal.setAttribute("aria-hidden", "true");
        });
        loadLieferant();
      } else {
        lieferantName.textContent = "Ungueltige Lieferanten-ID";
        lieferantMeta.textContent = "";
      }
    </script>
    <script src="/static/profile-widget.js"></script>
    <script src="/static/mobile-nav.js"></script>
  </body>
</html>
