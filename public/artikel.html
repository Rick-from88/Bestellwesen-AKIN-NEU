<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Artikel</title>
    <link rel="stylesheet" href="/static/styles/uebersicht.css" />
    <link
      rel="stylesheet"
      href="/vendor/shepherd/shepherd.css"
    />
    <script src="/vendor/popper/popper.min.js"></script>
    <script src="/vendor/shepherd/shepherd.min.js"></script>
    <script src="/tour.js" defer></script>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1>Artikel</h1>
        <p class="hero__subtitle">Alle Artikel pro Lieferant im Ueberblick.</p>
        <div class="hero__actions">
          <button class="btn btn--primary" id="addArtikelBtn">
            Artikel hinzufuegen
          </button>
          <button class="btn btn--ghost" id="artikelRefresh">
            Aktualisieren
          </button>
        </div>
      </header>

      <section class="panel">
        <div class="panel__header">
          <div>
            <h2>Artikelverzeichnis</h2>
            <div id="artikelCount" style="color: var(--ink-soft)">Laden...</div>
          </div>
          <div class="filter-bar">
            <input
              id="artikelSearch"
              type="search"
              placeholder="Suchen (Artikel, Nummer, Lieferant ...)"
            />
            <select id="artikelLieferantFilter">
              <option value="">Lieferant: alle</option>
            </select>
            <select id="artikelSort">
              <option value="name-asc">Artikelbezeichnung A–Z</option>
              <option value="name-desc">Artikelbezeichnung Z–A</option>
              <option value="preis-asc">Preis aufsteigend</option>
              <option value="preis-desc">Preis absteigend</option>
            </select>
          </div>
        </div>
        <div class="list" id="artikelList"></div>
      </section>
    </div>

    <div class="modal" id="artikelModal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div class="modal__content" role="dialog" aria-modal="true">
        <div class="modal__header">
          <h2 id="artikelModalTitle">Artikel bearbeiten</h2>
          <button class="btn btn--link" type="button" id="artikelModalClose">
            Schliessen
          </button>
        </div>
        <form id="artikelForm" class="form">
          <div class="form__row">
            <label for="artikelLieferantInput">Lieferant</label>
            <select
              id="artikelLieferantInput"
              name="lieferantId"
              required
            ></select>
          </div>
          <div class="form__row">
            <label for="artikelNameInput">Artikelbezeichnung</label>
            <input id="artikelNameInput" name="name" type="text" required />
          </div>
          <div class="form__row">
            <label for="artikelBeschreibungInput">Artikelbeschreibung</label>
            <input
              id="artikelBeschreibungInput"
              name="beschreibung"
              type="text"
            />
          </div>
          <div class="form__row">
            <label for="artikelNummerInput">Artikelnummer</label>
            <input id="artikelNummerInput" name="artikelnummer" type="text" />
          </div>
          <div class="form__row">
            <label for="artikelEinheitInput">Einheit</label>
            <input id="artikelEinheitInput" name="einheit" type="text" />
          </div>
          <div class="form__row">
            <label for="artikelVerpackungInput">VE</label>
            <input
              id="artikelVerpackungInput"
              name="verpackungseinheit"
              type="text"
            />
          </div>
          <div class="form__row">
            <label for="artikelStandardBestellwertInput">Standardbestellwert</label>
            <input
              id="artikelStandardBestellwertInput"
              name="standardBestellwert"
              type="number"
              min="1"
              step="1"
            />
          </div>
          <div class="form__row">
            <label for="artikelPreisInput">Preis</label>
            <input
              id="artikelPreisInput"
              name="preis"
              type="number"
              step="0.01"
              min="0"
              required
            />
          </div>
          <div class="form__row">
            <label for="artikelFotoCaptureBtn">Foto</label>
            <div>
              <div style="display: flex; gap: 8px; flex-wrap: wrap">
                <button class="btn btn--small btn--ghost" type="button" id="artikelFotoCaptureBtn">
                  Foto aufnehmen
                </button>
                <button class="btn btn--small btn--ghost" type="button" id="artikelFotoGalleryBtn">
                  Aus Galerie waehlen
                </button>
              </div>
              <input
                id="artikelFotoCaptureInput"
                type="file"
                accept="image/*"
                capture="environment"
                style="display: none"
              />
              <input
                id="artikelFotoGalleryInput"
                type="file"
                accept="image/*"
                style="display: none"
              />
              <div id="artikelFotoFilename" class="list__meta" style="margin-top: 6px">
                Kein Foto gewaehlt
              </div>
              <div style="margin-top: 8px; display: flex; gap: 8px; align-items: center">
                <img
                  id="artikelFotoPreview"
                  alt="Artikelbild Vorschau"
                  style="display: none; width: 56px; height: 56px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(0,0,0,0.08); cursor: zoom-in"
                />
                <button class="btn btn--small btn--ghost" type="button" id="artikelFotoClear">
                  Foto entfernen
                </button>
              </div>
            </div>
          </div>
          <div class="form__actions">
            <button class="btn btn--primary" type="submit">Speichern</button>
            <button class="btn btn--ghost" type="button" id="artikelCancel">
              Abbrechen
            </button>
            <button class="btn btn--danger" type="button" id="artikelDelete">
              Loeschen
            </button>
          </div>
          <div id="artikelMessage" class="form__message" role="status"></div>
        </form>
      </div>
    </div>

    <div class="modal" id="artikelFotoModal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div class="modal__content" role="dialog" aria-modal="true">
        <div class="modal__header">
          <h2>Artikelfoto</h2>
          <button class="btn btn--link" type="button" id="artikelFotoModalClose">
            Schliessen
          </button>
        </div>
        <img
          id="artikelFotoModalImage"
          alt="Artikelfoto Grossansicht"
          style="max-width: 100%; width: 100%; height: auto; border-radius: 12px"
        />
      </div>
    </div>

    <nav class="navbar">
      <a class="navbar__item" href="/uebersicht">Dashboard</a>
      <a class="navbar__item" href="/bestellungen">Bestellungen</a>
      <a class="navbar__item" href="/lieferanten">Lieferanten</a>
      <a class="navbar__item is-active" href="/artikel">Artikel</a>
      <a class="navbar__item" href="/einstellungen">Einstellungen</a>
    </nav>

    <script>
      const artikelList = document.getElementById("artikelList");
      const artikelCount = document.getElementById("artikelCount");
      const deleteIntentHeaders = { "X-Delete-Intent": "true" };
      const confirmDoubleDelete = (
        firstMessage = "Wirklich loeschen?",
        secondMessage = "Endgueltig loeschen?",
      ) => {
        if (!window.confirm(firstMessage)) return false;
        return window.confirm(secondMessage);
      };
      const artikelRefresh = document.getElementById("artikelRefresh");
      const addArtikelBtn = document.getElementById("addArtikelBtn");
      const artikelModal = document.getElementById("artikelModal");
      const artikelModalClose = document.getElementById("artikelModalClose");
      const artikelModalTitle = document.getElementById("artikelModalTitle");
      const artikelForm = document.getElementById("artikelForm");
      const artikelMessage = document.getElementById("artikelMessage");
      const artikelLieferantInput = document.getElementById(
        "artikelLieferantInput",
      );
      const artikelNameInput = document.getElementById("artikelNameInput");
      const artikelNummerInput = document.getElementById("artikelNummerInput");
      const artikelEinheitInput = document.getElementById(
        "artikelEinheitInput",
      );
      const artikelVerpackungInput = document.getElementById(
        "artikelVerpackungInput",
      );
      const artikelStandardBestellwertInput = document.getElementById(
        "artikelStandardBestellwertInput",
      );
      const artikelBeschreibungInput = document.getElementById(
        "artikelBeschreibungInput",
      );
      const artikelPreisInput = document.getElementById("artikelPreisInput");
      const artikelFotoCaptureBtn = document.getElementById(
        "artikelFotoCaptureBtn",
      );
      const artikelFotoGalleryBtn = document.getElementById(
        "artikelFotoGalleryBtn",
      );
      const artikelFotoCaptureInput = document.getElementById(
        "artikelFotoCaptureInput",
      );
      const artikelFotoGalleryInput = document.getElementById(
        "artikelFotoGalleryInput",
      );
      const artikelFotoFilename = document.getElementById("artikelFotoFilename");
      const artikelFotoPreview = document.getElementById("artikelFotoPreview");
      const artikelFotoClear = document.getElementById("artikelFotoClear");
      const artikelFotoModal = document.getElementById("artikelFotoModal");
      const artikelFotoModalClose = document.getElementById(
        "artikelFotoModalClose",
      );
      const artikelFotoModalImage = document.getElementById(
        "artikelFotoModalImage",
      );
      const artikelCancel = document.getElementById("artikelCancel");
      const artikelDelete = document.getElementById("artikelDelete");
      const artikelSearch = document.getElementById("artikelSearch");
      const artikelLieferantFilter = document.getElementById(
        "artikelLieferantFilter",
      );
      const artikelSort = document.getElementById("artikelSort");

      let currentArtikelId = null;
      let lieferantenData = [];
      let lastOpenedLieferantId = null;
      let _modalOpener = null;
      let currentFotoUrl = "";
      const artikelUrlParams = new URLSearchParams(window.location.search);
      let pendingOpenArtikelId = Number(artikelUrlParams.get("open") || "");
      const openLieferantIds = new Set();

      const setFotoPreview = (url) => {
        currentFotoUrl = String(url || "").trim();
        if (!artikelFotoPreview) return;
        if (!currentFotoUrl) {
          artikelFotoPreview.style.display = "none";
          artikelFotoPreview.removeAttribute("src");
          return;
        }
        artikelFotoPreview.src = currentFotoUrl;
        artikelFotoPreview.style.display = "block";
      };

      const readFileAsDataUrl = (file) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden."));
          reader.readAsDataURL(file);
        });

      const loadImage = (src) =>
        new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("Bild konnte nicht geladen werden."));
          img.src = src;
        });

      const compressImageDataUrl = async (file) => {
        const originalDataUrl = await readFileAsDataUrl(file);
        if (!String(file.type || "").startsWith("image/")) {
          return originalDataUrl;
        }

        const img = await loadImage(originalDataUrl);
        const maxSide = 1600;
        const scale = Math.min(maxSide / img.width, maxSide / img.height, 1);
        const targetW = Math.max(1, Math.round(img.width * scale));
        const targetH = Math.max(1, Math.round(img.height * scale));

        const canvas = document.createElement("canvas");
        canvas.width = targetW;
        canvas.height = targetH;
        const ctx = canvas.getContext("2d");
        if (!ctx) return originalDataUrl;
        ctx.drawImage(img, 0, 0, targetW, targetH);

        // JPEG reduziert Datenmenge stark bei Fotos.
        return canvas.toDataURL("image/jpeg", 0.82);
      };

      const readFotoFile = async (file) => {
        if (!file) return;
        try {
          if (artikelFotoFilename) {
            artikelFotoFilename.textContent = "Bild wird optimiert...";
          }
          const optimizedDataUrl = await compressImageDataUrl(file);
          setFotoPreview(optimizedDataUrl);
          if (artikelFotoFilename) {
            artikelFotoFilename.textContent = file.name || "Foto ausgewaehlt";
          }
        } catch (e) {
          console.error(e);
          if (artikelFotoFilename) {
            artikelFotoFilename.textContent = "Fehler beim Verarbeiten des Bildes";
          }
        }
      };

      const refreshLieferantSelect = (selectedId) => {
        artikelLieferantInput.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Lieferant waehlen";
        artikelLieferantInput.appendChild(placeholder);

        lieferantenData.forEach((lieferant) => {
          const option = document.createElement("option");
          option.value = String(lieferant.id);
          option.textContent = lieferant.name;
          if (selectedId && lieferant.id === selectedId) {
            option.selected = true;
          }
          artikelLieferantInput.appendChild(option);
        });
      };

      const openArtikelModal = (artikel = null) => {
        currentArtikelId = artikel ? artikel.id : null;
        artikelMessage.textContent = "";
        artikelNameInput.value = artikel?.name || "";
        artikelNummerInput.value = artikel?.artikelnummer || "";
        artikelEinheitInput.value = artikel?.einheit || "";
        artikelVerpackungInput.value = artikel?.verpackungseinheit || "";
        artikelStandardBestellwertInput.value =
          artikel?.standardBestellwert ?? "";
        artikelBeschreibungInput.value = artikel?.beschreibung || "";
        artikelPreisInput.value = artikel?.preis ?? "";
        if (artikelFotoCaptureInput) artikelFotoCaptureInput.value = "";
        if (artikelFotoGalleryInput) artikelFotoGalleryInput.value = "";
        setFotoPreview(artikel?.fotoUrl || "");
        if (artikelFotoFilename) {
          artikelFotoFilename.textContent = artikel?.fotoUrl
            ? "Vorhandenes Foto"
            : "Kein Foto gewaehlt";
        }
        artikelModalTitle.textContent = artikel
          ? "Artikel bearbeiten"
          : "Artikel hinzufuegen";
        artikelDelete.style.display = artikel ? "inline-flex" : "none";
        const defaultLieferantId =
          artikel?.lieferantId ??
          lastOpenedLieferantId ??
          (lieferantenData[0] ? lieferantenData[0].id : null);
        refreshLieferantSelect(defaultLieferantId);
        // accessibility: save opener, make main content inert if supported, focus first field
        _modalOpener = document.activeElement;
        const main = document.querySelector(".page");
        if (main) main.inert = true;
        artikelModal.classList.add("is-open");
        // remove aria-hidden only after focus shift
        artikelModal.removeAttribute("aria-hidden");
        const firstFocusable = artikelLieferantInput || artikelNameInput;
        if (firstFocusable && typeof firstFocusable.focus === "function") {
          firstFocusable.focus();
        }
      };

      const closeArtikelModal = () => {
        // if something inside modal still has focus, blur it before hiding
        try {
          if (artikelModal.contains(document.activeElement)) {
            document.activeElement.blur();
          }
        } catch (e) {}

        artikelModal.classList.remove("is-open");
        // hide modal from AT
        artikelModal.setAttribute("aria-hidden", "true");
        const main = document.querySelector(".page");
        if (main) main.inert = false;
        // restore focus to opener
        if (_modalOpener && typeof _modalOpener.focus === "function") {
          _modalOpener.focus();
        }
        currentArtikelId = null;
      };

      const normalizeList = (data) => {
        if (Array.isArray(data)) {
          return data;
        }
        if (data && Array.isArray(data.value)) {
          return data.value;
        }
        return [];
      };

      const formatCurrency = (value) => {
        const amount = Number(value);
        if (!Number.isFinite(amount)) {
          return "-";
        }
        return new Intl.NumberFormat("de-DE", {
          style: "currency",
          currency: "EUR",
        }).format(amount);
      };

      let artikelByLieferantGlobal = {};

      /** Einheitliche Map-Keys (API kann id als Zahl oder String liefern). */
      const lieferantKey = (id) => String(id ?? "");

      const renderArtikel = (lieferanten, artikelByLieferant) => {
        artikelList.innerHTML = "";

        const totalArtikel = Object.values(artikelByLieferant).reduce(
          (sum, items) => sum + items.length,
          0,
        );
        artikelCount.textContent = `${totalArtikel} Artikel`;

        if (!lieferanten.length) {
          const emptyRow = document.createElement("div");
          emptyRow.className = "list__row";
          emptyRow.textContent = "Keine Lieferanten vorhanden.";
          artikelList.appendChild(emptyRow);
          return;
        }

        lieferanten.forEach((lieferant) => {
          const lieferantId = Number(lieferant.id);
          const group = document.createElement("div");
          group.className = "supplier-group";
          group.classList.toggle("is-open", openLieferantIds.has(lieferantId));

          const headerRow = document.createElement("div");
          headerRow.className = "list__row list__row--clickable";

          const leftDiv = document.createElement("div");
          const title = document.createElement("div");
          title.className = "list__title";
          title.textContent = lieferant.name;

          const meta = document.createElement("div");
          meta.className = "list__meta";
          meta.textContent = lieferant.kontaktPerson || "Keine Kontaktperson";

          leftDiv.appendChild(title);
          leftDiv.appendChild(meta);

          const rightDiv = document.createElement("div");
          rightDiv.style.textAlign = "right";
          const countMeta = document.createElement("div");
          countMeta.className = "list__meta";
          const items = artikelByLieferant[lieferantKey(lieferant.id)] || [];
          countMeta.textContent = `${items.length} Artikel`;
          rightDiv.appendChild(countMeta);

          headerRow.appendChild(leftDiv);
          headerRow.appendChild(rightDiv);
          headerRow.addEventListener("click", () => {
            lastOpenedLieferantId = lieferantId;
            group.classList.toggle("is-open");
            if (group.classList.contains("is-open")) {
              openLieferantIds.add(lieferantId);
            } else {
              openLieferantIds.delete(lieferantId);
            }
          });
          group.appendChild(headerRow);

          const itemsContainer = document.createElement("div");
          itemsContainer.className = "supplier-items";

          if (!items.length) {
            const emptyRow = document.createElement("div");
            emptyRow.className = "list__row list__row--sub";
            emptyRow.textContent = "Keine Artikel fuer diesen Lieferanten.";
            itemsContainer.appendChild(emptyRow);
          } else {
            items.forEach((artikel) => {
              const row = document.createElement("div");
              row.className = "list__row list__row--sub";
              row.addEventListener("dblclick", () => {
                openArtikelModal({
                  ...artikel,
                  lieferantId: artikel.lieferantId ?? lieferant.id,
                });
              });

              const itemLeft = document.createElement("div");
              itemLeft.style.display = "flex";
              itemLeft.style.alignItems = "center";
              itemLeft.style.gap = "10px";
              if (artikel.fotoUrl) {
                const img = document.createElement("img");
                img.src = artikel.fotoUrl;
                img.alt = artikel.name || "Artikelfoto";
                img.style.width = "42px";
                img.style.height = "42px";
                img.style.borderRadius = "8px";
                img.style.objectFit = "cover";
                img.style.cursor = "zoom-in";
                img.addEventListener("click", (e) => {
                  e.stopPropagation();
                  artikelFotoModalImage.src = artikel.fotoUrl;
                  artikelFotoModal.classList.add("is-open");
                  artikelFotoModal.setAttribute("aria-hidden", "false");
                });
                itemLeft.appendChild(img);
              }
              const itemText = document.createElement("div");
              const itemTitle = document.createElement("div");
              itemTitle.className = "list__title";
              itemTitle.textContent = artikel.name;

              const itemMeta = document.createElement("div");
              itemMeta.className = "list__meta";
              const nummer = artikel.artikelnummer
                ? `#${artikel.artikelnummer}`
                : "";
              const unit = artikel.einheit ? ` | ${artikel.einheit}` : "";
              const verpack = artikel.verpackungseinheit
                ? ` | VE: ${artikel.verpackungseinheit}`
                : "";
              const standardBestellwert = artikel.standardBestellwert
                ? ` | Std: ${artikel.standardBestellwert}`
                : "";
              itemMeta.textContent = `${nummer} Preis: ${formatCurrency(artikel.preis)}${unit}${verpack}${standardBestellwert}`;

              itemText.appendChild(itemTitle);
              itemText.appendChild(itemMeta);
              itemLeft.appendChild(itemText);

              row.appendChild(itemLeft);
              itemsContainer.appendChild(row);

              if (
                Number.isFinite(pendingOpenArtikelId) &&
                pendingOpenArtikelId > 0 &&
                Number(artikel.id) === pendingOpenArtikelId
              ) {
                group.classList.add("is-open");
                openLieferantIds.add(lieferantId);
                openArtikelModal({
                  ...artikel,
                  lieferantId: artikel.lieferantId ?? lieferant.id,
                });
                pendingOpenArtikelId = NaN;
                const cleanUrl = `${window.location.pathname}${window.location.hash || ""}`;
                window.history.replaceState({}, "", cleanUrl);
              }
            });
          }

          group.appendChild(itemsContainer);
          artikelList.appendChild(group);
        });
      };

      const applyArtikelFilterAndSort = () => {
        const termRaw = String(artikelSearch?.value || "").toLowerCase().trim();
        const tokens = termRaw ? termRaw.split(/\s+/).filter(Boolean) : [];
        const filterLieferantId =
          artikelLieferantFilter?.value || "";
        const sort = artikelSort?.value || "name-asc";

        const lieferanten = [...lieferantenData];
        const artikelByLieferant = {};

        lieferanten.forEach((l) => {
          if (filterLieferantId && lieferantKey(l.id) !== filterLieferantId) {
            return;
          }
          const items = [...(artikelByLieferantGlobal[lieferantKey(l.id)] || [])];

          let filtered = items;
          if (tokens.length) {
            filtered = items.filter((a) => {
              const nummer = a.artikelnummer || "";
              const text = [
                a.name,
                nummer,
                l.name,
                a.beschreibung,
                a.einheit,
                a.verpackungseinheit,
                a.standardBestellwert,
                a.preis,
              ]
                .filter(Boolean)
                .join(" ")
                .toLowerCase();
              return tokens.every((t) => text.includes(t));
            });
          }

          filtered.sort((a, b) => {
            const nameA = (a.name || "").toLowerCase();
            const nameB = (b.name || "").toLowerCase();
            const preisA = Number(a.preis || 0);
            const preisB = Number(b.preis || 0);
            switch (sort) {
              case "name-desc":
                return nameB.localeCompare(nameA);
              case "preis-asc":
                return preisA - preisB;
              case "preis-desc":
                return preisB - preisA;
              default:
                return nameA.localeCompare(nameB);
            }
          });

          artikelByLieferant[lieferantKey(l.id)] = filtered;
        });

        const baseLieferanten = filterLieferantId
          ? lieferanten.filter((l) => lieferantKey(l.id) === filterLieferantId)
          : lieferanten;
        const visibleLieferanten =
          tokens.length > 0
            ? baseLieferanten.filter(
                (l) =>
                  (artikelByLieferant[lieferantKey(l.id)] || []).length > 0,
              )
            : baseLieferanten;

        renderArtikel(visibleLieferanten, artikelByLieferant);
      };

      const loadArtikel = async () => {
        try {
          const response = await fetch("/api/lieferanten");
          const lieferantenResponse = await response.json();
          const lieferanten = normalizeList(lieferantenResponse);
          lieferantenData = lieferanten;
          // Lieferanten-Filter befüllen (Auswahl beibehalten, falls Lieferant noch existiert)
          const prevLieferantFilter = artikelLieferantFilter
            ? String(artikelLieferantFilter.value || "")
            : "";
          if (artikelLieferantFilter) {
            artikelLieferantFilter.innerHTML = "";
            const allOpt = document.createElement("option");
            allOpt.value = "";
            allOpt.textContent = "Lieferant: alle";
            artikelLieferantFilter.appendChild(allOpt);
            lieferanten.forEach((l) => {
              const opt = document.createElement("option");
              opt.value = lieferantKey(l.id);
              opt.textContent = l.name;
              artikelLieferantFilter.appendChild(opt);
            });
            if (
              prevLieferantFilter &&
              [...artikelLieferantFilter.options].some(
                (o) => o.value === prevLieferantFilter,
              )
            ) {
              artikelLieferantFilter.value = prevLieferantFilter;
            }
          }

          const artikelRequests = lieferanten.map((lieferant) =>
            fetch(`/api/lieferanten/${lieferant.id}/artikel`).then((res) =>
              res.json(),
            ),
          );

          const artikelResults = await Promise.all(artikelRequests);
          const artikelByLieferant = {};
          artikelResults.forEach((items, index) => {
            artikelByLieferant[lieferantKey(lieferanten[index].id)] =
              normalizeList(items);
          });

          artikelByLieferantGlobal = artikelByLieferant;
          applyArtikelFilterAndSort();
        } catch (error) {
          console.error("Fehler beim Laden der Artikel:", error);
          artikelCount.textContent = "Fehler beim Laden";
        }
      };

      artikelRefresh.addEventListener("click", () => {
        if (artikelSearch) artikelSearch.value = "";
        if (artikelLieferantFilter) artikelLieferantFilter.value = "";
        if (artikelSort) artikelSort.value = "name-asc";
        loadArtikel();
      });
      addArtikelBtn.addEventListener("click", () => {
        openArtikelModal();
      });
      artikelForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        artikelMessage.textContent = "";

        const payload = {
          lieferantId: Number(artikelLieferantInput.value),
          name: artikelNameInput.value.trim(),
          artikelnummer: artikelNummerInput.value.trim() || undefined,
          einheit: artikelEinheitInput.value.trim() || undefined,
          verpackungseinheit: artikelVerpackungInput.value.trim() || undefined,
          standardBestellwert: Number(artikelStandardBestellwertInput.value || 0) || undefined,
          fotoUrl: currentFotoUrl || undefined,
          beschreibung: artikelBeschreibungInput.value.trim(),
          preis: Number(artikelPreisInput.value),
        };

        if (!payload.lieferantId || !payload.name || !Number.isFinite(payload.preis)) {
          artikelMessage.textContent =
            "Lieferant, Artikelbezeichnung und Preis sind erforderlich.";
          return;
        }

        try {
          const isCreate = !currentArtikelId;
          const response = await fetch(
            isCreate ? "/api/artikel" : `/api/artikel/${currentArtikelId}`,
            {
              method: isCreate ? "POST" : "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            },
          );

          if (!response.ok) {
            const errorText = await response.text();
            artikelMessage.textContent = `Fehler: ${errorText}`;
            return;
          }

          closeArtikelModal();
          loadArtikel();
        } catch (error) {
          console.error("Fehler beim Speichern:", error);
          artikelMessage.textContent = "Speichern fehlgeschlagen.";
        }
      });

      artikelCancel.addEventListener("click", closeArtikelModal);
      artikelDelete.addEventListener("click", async () => {
        if (!currentArtikelId) {
          return;
        }

        const confirmed = confirmDoubleDelete(
          "Soll dieser Artikel wirklich geloescht werden?",
          "Artikel endgueltig loeschen?",
        );
        if (!confirmed) {
          return;
        }

        try {
          const response = await fetch(`/api/artikel/${currentArtikelId}`, {
            method: "DELETE",
            headers: deleteIntentHeaders,
          });

          if (!response.ok) {
            const errorText = await response.text();
            artikelMessage.textContent = `Fehler: ${errorText}`;
            return;
          }

          closeArtikelModal();
          loadArtikel();
        } catch (error) {
          console.error("Fehler beim Loeschen:", error);
          artikelMessage.textContent = "Loeschen fehlgeschlagen.";
        }
      });
      artikelModalClose.addEventListener("click", closeArtikelModal);
      if (artikelFotoCaptureBtn && artikelFotoCaptureInput) {
        artikelFotoCaptureBtn.addEventListener("click", () => {
          artikelFotoCaptureInput.click();
        });
      }
      if (artikelFotoGalleryBtn && artikelFotoGalleryInput) {
        artikelFotoGalleryBtn.addEventListener("click", () => {
          artikelFotoGalleryInput.click();
        });
      }
      if (artikelFotoCaptureInput) {
        artikelFotoCaptureInput.addEventListener("change", (event) => {
          const file = event.target.files?.[0];
          readFotoFile(file);
        });
      }
      if (artikelFotoGalleryInput) {
        artikelFotoGalleryInput.addEventListener("change", (event) => {
          const file = event.target.files?.[0];
          readFotoFile(file);
        });
      }
      if (artikelFotoClear) {
        artikelFotoClear.addEventListener("click", () => {
          if (artikelFotoCaptureInput) artikelFotoCaptureInput.value = "";
          if (artikelFotoGalleryInput) artikelFotoGalleryInput.value = "";
          setFotoPreview("");
          if (artikelFotoFilename) artikelFotoFilename.textContent = "Kein Foto gewaehlt";
        });
      }
      if (artikelFotoPreview) {
        artikelFotoPreview.addEventListener("click", () => {
          if (!currentFotoUrl) return;
          artikelFotoModalImage.src = currentFotoUrl;
          artikelFotoModal.classList.add("is-open");
          artikelFotoModal.setAttribute("aria-hidden", "false");
        });
      }
      if (artikelFotoModalClose) {
        artikelFotoModalClose.addEventListener("click", () => {
          artikelFotoModal.classList.remove("is-open");
          artikelFotoModal.setAttribute("aria-hidden", "true");
        });
      }
      artikelFotoModal
        .querySelector(".modal__backdrop")
        .addEventListener("click", () => {
          artikelFotoModal.classList.remove("is-open");
          artikelFotoModal.setAttribute("aria-hidden", "true");
        });
      artikelModal
        .querySelector(".modal__backdrop")
        .addEventListener("click", closeArtikelModal);
      if (artikelSearch) {
        artikelSearch.addEventListener("input", applyArtikelFilterAndSort);
      }
      if (artikelLieferantFilter) {
        artikelLieferantFilter.addEventListener(
          "change",
          applyArtikelFilterAndSort,
        );
        artikelLieferantFilter.addEventListener(
          "input",
          applyArtikelFilterAndSort,
        );
      }
      if (artikelSort) {
        artikelSort.addEventListener("change", applyArtikelFilterAndSort);
        artikelSort.addEventListener("input", applyArtikelFilterAndSort);
      }
      loadArtikel();
    </script>
    <script src="/auth-guard.js"></script>
    <script src="/profile-widget.js"></script>
    <script src="/mobile-nav.js"></script>
  </body>
</html>
